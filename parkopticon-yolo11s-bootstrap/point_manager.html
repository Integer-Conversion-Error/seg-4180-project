<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street View Point Manager</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface-hover: #252525;
            --border: #333;
            --text: #e5e5e5;
            --text-dim: #888;
            --accent: #ff6b35;
            --accent-dim: #ff6b3533;
            --success: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 15px; font-weight: 600; }
        h1 span { color: var(--accent); }

        .header-actions { display: flex; gap: 8px; }

        button {
            font-family: 'Outfit', sans-serif;
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: var(--border); }
        button.primary { background: var(--accent); border-color: var(--accent); color: #000; }
        button.primary:hover { background: #ff8555; }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar-left {
            width: 800px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-right {
            width: 280px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section h3 {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .preview-section {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .preview-nav {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            align-items: center;
        }

        .preview-nav button {
            padding: 4px 8px;
            font-size: 11px;
        }

        .preview-nav span {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: var(--accent);
        }

        .heading-slider {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .heading-slider label {
            font-size: 10px;
            color: var(--text-dim);
            min-width: 50px;
        }

        .heading-slider input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .heading-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .heading-slider .value {
            font-size: 11px;
            color: var(--accent);
            min-width: 35px;
            text-align: right;
        }

        .preview-image {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
        }

        .preview-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .preview-info {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.75);
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
        }

        .template-row {
            display: grid;
            grid-template-columns: 40px 50px 1fr 1fr;
            gap: 4px;
            margin-bottom: 4px;
            align-items: center;
        }

        .template-row label {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
        }

        .template-row label.heading {
            color: var(--accent);
            font-weight: 600;
        }

        .template-row label.heading.active {
            background: var(--accent);
            color: var(--bg);
            border-radius: 3px;
            padding: 2px 4px;
        }

        .template-row input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .slider-cell {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .slider-inline-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--accent);
            white-space: nowrap;
        }

        .slider-cell input[type="range"] {
            flex: 1;
            min-width: 0;
        }

        .template-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-align: center;
            color: var(--accent);
            background: var(--bg);
            padding: 2px 4px;
            border-radius: 2px;
        }

        .param-import {
            margin-top: 10px;
            padding: 10px;
            background: var(--bg);
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .param-import label {
            font-size: 10px;
            color: var(--text-dim);
            display: block;
            margin-bottom: 6px;
        }

        .param-import textarea {
            width: 100%;
            height: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 6px;
            resize: none;
        }

        .param-import input[type="text"],
        .param-import select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 6px;
        }

        .preset-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .preset-actions button {
            margin-top: 0;
            width: auto;
            flex: 1;
        }

        .param-import button {
            margin-top: 6px;
            width: 100%;
        }

        .points-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .point-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px 10px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .point-item:hover { border-color: #555; }
        .point-item.selected { 
            border-color: var(--accent); 
            background: var(--accent-dim);
        }

        .point-item .coords { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 11px; 
        }

        .point-item .meta { 
            font-size: 9px; 
            color: var(--text-dim); 
            margin-top: 2px; 
        }

        .point-item .delete-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .point-item .delete-btn:hover {
            background: #c00;
            color: white;
        }

        .point-item {
            position: relative;
        }

        #map { 
            flex: 1; 
            background: #111;
        }

        .leaflet-container {
            height: 100% !important;
            width: 100% !important;
            background: #111;
        }

        .custom-marker {
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(255, 107, 53, 0.4);
        }

        .custom-marker.selected {
            background: var(--success);
            box-shadow: 0 2px 8px rgba(74, 222, 128, 0.5);
        }

        .selection-info {
            font-size: 11px;
            color: var(--text-dim);
            padding: 8px 12px;
            border-top: 1px solid var(--border);
        }

        .selection-info strong { color: var(--accent); }

        .api-counter {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 4px 12px;
            font-size: 10px;
            color: var(--text-dim);
            display: flex;
            gap: 20px;
            z-index: 1000;
        }

        .api-counter span { color: var(--accent); }

        .sampler-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sampler-controls label {
            font-size: 10px;
            color: var(--text-dim);
        }

        .sampler-controls input,
        .sampler-controls textarea,
        .sampler-controls select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 6px;
        }

        .sampler-controls textarea {
            height: 72px;
            resize: vertical;
        }

        .sampler-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .sampler-grid .full {
            grid-column: 1 / -1;
        }

        .sampler-status {
            margin-top: 6px;
            font-size: 10px;
            color: var(--text-dim);
            line-height: 1.35;
            white-space: pre-wrap;
        }

        .sampler-dryrun-preview {
            display: none;
            margin-top: 6px;
            border: 1px dashed var(--border);
            border-radius: 4px;
            padding: 6px;
            font-size: 10px;
            color: var(--text-dim);
            background: rgba(103, 232, 249, 0.08);
        }

        .sampler-dryrun-preview .title {
            color: var(--text);
            margin-bottom: 4px;
        }

        .sampler-dryrun-preview .list {
            display: grid;
            gap: 2px;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>Street View <span>Point Manager</span></h1>
        <div class="header-actions">
            <button type="button" onclick="clearSelection()">Clear</button>
            <button type="button" onclick="selectAll()">Select All</button>
            <button type="button" class="primary" onclick="applyTemplate()">Apply Template</button>
            <button type="button" onclick="downloadCSV()">Download</button>
        </div>
    </header>
    
    <div class="main">
        <!-- Left sidebar: Template -->
        <div class="sidebar-left">
            <div class="preview-section">
                <h3>Preview</h3>
                <div class="preview-nav">
                    <button type="button" onclick="prevPreview()">←</button>
                    <span id="preview-dir">1 / 8</span>
                    <button type="button" onclick="nextPreview()">→</button>
                    <button type="button" onclick="playPreview()" id="play-btn">▶</button>
                </div>
                <div class="heading-slider">
                    <label>Heading:</label>
                    <input type="range" id="heading-slider" min="0" max="360" value="0" oninput="updateHeading(this.value)">
                    <span class="value" id="heading-value">0°</span>
                </div>
                <div class="preview-image" id="preview-image-wrap">
                    <img id="preview-img" alt="Street View">
                    <div class="preview-info" id="preview-info">Select a point</div>
                </div>
            </div>

            <div class="sidebar-section" style="flex:1;overflow-y:auto">
                <h3>Template (8 directions)</h3>
                <p style="font-size:9px;color:var(--text-dim);margin-bottom:8px">
                    Headings: base + 0°, +45°, +90°...
                </p>
                
                <div id="template-rows"></div>

                <div class="param-import" style="margin-top: 10px;">
                    <label>Bottom Crop (px):</label>
                    <input type="range" id="bottom-crop" value="0" min="0" max="200"
                           oninput="updateBottomCrop(this.value)">
                    <span id="bottom-crop-val" style="color: var(--accent); margin-left: 8px;">0px</span>
                </div>

                <div class="param-import">
                    <label>Template Presets:</label>
                    <input type="text" id="template-name" placeholder="Template name">
                    <div class="preset-actions">
                        <button type="button" onclick="saveTemplatePreset()">Save</button>
                        <button type="button" onclick="loadTemplatePreset()">Load</button>
                        <button type="button" onclick="deleteTemplatePreset()">Delete</button>
                    </div>
                    <select id="template-preset-select" style="margin-top: 6px;"></select>
                </div>

                <div class="param-import">
                    <label>Import from Tester:</label>
                    <textarea id="import-params" placeholder="Paste params..."></textarea>
                    <button type="button" onclick="importFromParams()">Apply</button>
                </div>
            </div>
        </div>
        
        <!-- Map -->
        <div id="map"></div>
        
        <!-- Right sidebar: Points -->
        <div class="sidebar-right">
            <div class="sidebar-section">
                <h3>Import Points</h3>
                <button type="button" onclick="document.getElementById('import-input').click()" style="width:100%">Import CSV</button>
                <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(this)">
            </div>

            <div class="sidebar-section">
                <h3>Fetch Street View</h3>
                <div class="sampler-controls">
                    <div class="sampler-grid">
                        <div>
                            <label>Scope</label>
                            <select id="bulk-fetch-scope">
                                <option value="all">All Points</option>
                                <option value="selected">Selected Points</option>
                            </select>
                        </div>
                        <div>
                            <label>Image Size</label>
                            <input type="number" id="bulk-fetch-size" min="128" max="2048" value="640">
                        </div>
                    </div>
                    <button type="button" id="bulk-fetch-btn" onclick="fetchStreetViewBatch()">Fetch & Download ZIP</button>
                    <div class="sampler-status" id="bulk-fetch-status">Idle</div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>Append By Area</h3>
                <div class="sampler-controls">
                    <div>
                        <label>Area Mode</label>
                        <select id="sampler-area-mode" onchange="updateAreaModeUI()">
                            <option value="bbox">BBox</option>
                            <option value="polygon">Polygon GeoJSON</option>
                        </select>
                    </div>

                    <div id="sampler-bbox-wrap">
                        <label>BBox (min_lat,min_lng,max_lat,max_lng)</label>
                        <input type="text" id="sampler-bbox" value="40.5,-74.1,40.9,-73.7">
                        <div style="display:flex;gap:6px;margin-top:6px;">
                            <button type="button" onclick="startBBoxDrawOnMap()">Draw BBox</button>
                            <button type="button" onclick="useCurrentViewAsBBox()">Use View</button>
                        </div>
                    </div>

                    <div id="sampler-polygon-wrap" style="display:none;">
                        <label>Polygon GeoJSON</label>
                        <textarea id="sampler-polygon" oninput="clearSamplerSegmentation()" placeholder='{"type":"Polygon","coordinates":[[[-74.1,40.5],[-73.7,40.5],[-73.7,40.9],[-74.1,40.9],[-74.1,40.5]]]}'></textarea>
                        <div style="display:flex;gap:6px;margin-top:6px;">
                            <button type="button" onclick="startPolygonDrawOnMap()">Draw Polygon</button>
                            <button type="button" onclick="finishPolygonDrawOnMap()">Finish</button>
                            <button type="button" onclick="useCurrentViewAsPolygon()">Use View</button>
                        </div>
                        <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
                            <input type="checkbox" id="sampler-segment-enabled" checked>
                            <label for="sampler-segment-enabled" style="margin:0;">Segment irregular shape into bounding boxes</label>
                        </div>
                        <div style="display:flex;gap:6px;margin-top:6px;">
                            <input type="number" id="sampler-segment-size" min="5" value="80" style="flex:1;" placeholder="Box size (m)">
                            <button type="button" onclick="buildPolygonSegmentsFromUI()">Build Segments</button>
                        </div>
                        <div id="sampler-segment-count" style="font-size:10px;color:var(--text-dim);margin-top:4px;">Segments: 0</div>
                    </div>

                    <button type="button" onclick="clearSamplerAreaOverlay()">Clear Area Overlay</button>

                    <div class="sampler-grid">
                        <div>
                            <label>Target Panos</label>
                            <input type="number" id="sampler-target" min="0" value="200">
                        </div>
                        <div>
                            <label>Radius (m)</label>
                            <input type="number" id="sampler-radius" min="1" value="50">
                        </div>
                        <div>
                            <label>Min Spacing (m)</label>
                            <input type="number" id="sampler-spacing" min="0" value="40">
                        </div>
                        <div>
                            <label>Seed</label>
                            <input type="number" id="sampler-seed" value="123">
                        </div>
                        <div>
                            <label>Max Attempts</label>
                            <input type="number" id="sampler-attempts" min="1" value="10000">
                        </div>
                        <div>
                            <label>Bottom Crop</label>
                            <input type="text" id="sampler-bottom-crop" placeholder="uses preview bottom crop">
                        </div>
                        <div class="full">
                            <label>Preview Template Directions</label>
                            <div id="sampler-template-summary" style="font-size:10px;color:var(--text-dim);line-height:1.35;">Using preview template settings.</div>
                        </div>
                        <div class="full">
                            <label>Label Prefix</label>
                            <input type="text" id="sampler-label-prefix" value="auto">
                        </div>
                        <div class="full" style="display:flex;align-items:center;gap:6px;">
                            <input type="checkbox" id="sampler-dry-run" style="width:auto;" checked>
                            <label for="sampler-dry-run" style="margin:0;">Dry Run (do not append rows)</label>
                        </div>
                        <div class="full">
                            <label>API Key Override (optional)</label>
                            <input type="text" id="sampler-api-key" placeholder="uses embedded API key">
                        </div>
                    </div>

                    <button type="button" id="sampler-run-btn" class="primary" onclick="appendByAreaSampling()">Append New Panos</button>
                    <div class="sampler-status" id="sampler-status">Idle</div>
                    <div class="sampler-dryrun-preview" id="sampler-dryrun-preview"></div>
                </div>
            </div>
            
            <div class="points-list" id="points-list"></div>
            
            <div class="selection-info">
                <strong id="selection-count">0</strong> selected
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const GSV_API_KEY = 'AIzaSyDtL6_O4JqV2j3FRaOxYRIibjoJPSP-VKs';
        const BASE_COLUMNS = ['street', 'label', 'location', 'heading', 'pitch', 'fov', 'radius', 'bottom_crop'];
        const ENRICHMENT_COLUMNS = ['source', 'sample_location', 'pano_id', 'pano_lat', 'pano_lng', 'pano_date', 'status', 'group_id', 'created_at'];
        const IMAGE_MANIFEST_COLUMNS = [
            'image_id', 'file_path', 'split', 'parent_image_id', 'is_synthetic',
            'edit_type', 'expected_inserted_class', 'street', 'input_location',
            'heading', 'pitch', 'fov', 'pano_id', 'pano_lat', 'pano_lng', 'status',
            'num_boxes_autogen', 'needs_review', 'review_status', 'created_at'
        ];

        let csvColumns = [...BASE_COLUMNS];
        let points = [];
        let selectedIds = new Set();
        let map, markers = {};
        
        let previewPoint = null;
        let previewDir = 0;
        let sliderHeading = 0;
        let playInterval = null;
        let headingDebounce = null;
        let pendingHeading = null;
        let templateDebounce = null;
        let isSampling = false;
        let isBulkFetching = false;
        let samplerDrawMode = null;
        let samplerDrawFirstCorner = null;
        let samplerDraftLatLngs = [];
        let samplerAreaLayer = null;
        let samplerDraftLayer = null;
        let samplerDraftVertices = [];
        let samplerSegmentationLayer = null;
        let samplerSegmentBoxes = [];
        let samplerDryRunPreviewLayer = null;
        
        let template = {
            baseHeading: 180,
            bottomCrop: 0,
            directions: Array(8).fill(null).map(() => ({ pitch: 0, fov: 80 }))
        };

        const PREVIEW_SOURCE_SIZE = 640;
        const TEMPLATE_SETTINGS_KEY = 'point_manager_template_settings_v1';
        const TEMPLATE_PRESETS_KEY = 'point_manager_template_presets_v1';

        function createDefaultDirections() {
            return Array(8).fill(null).map(() => ({ pitch: 0, fov: 80 }));
        }

        function clampBottomCrop(value) {
            return Math.max(0, Math.min(200, value));
        }

        function normalizeHeading(value) {
            const parsed = Number.parseInt(value, 10);
            if (Number.isNaN(parsed)) return 180;
            return ((parsed % 360) + 360) % 360;
        }

        function normalizeDirections(rawDirections) {
            const defaults = createDefaultDirections();
            if (!Array.isArray(rawDirections)) return defaults;

            return defaults.map((fallback, index) => {
                const raw = rawDirections[index] || {};
                const pitchValue = Number.parseInt(raw.pitch, 10);
                const fovValue = Number.parseInt(raw.fov, 10);

                return {
                    pitch: Number.isNaN(pitchValue) ? fallback.pitch : Math.max(-90, Math.min(90, pitchValue)),
                    fov: Number.isNaN(fovValue) ? fallback.fov : Math.max(30, Math.min(120, fovValue))
                };
            });
        }

        function applyPreviewCrop() {
            const container = document.getElementById('preview-image-wrap');
            const image = document.getElementById('preview-img');
            if (!container || !image) return;

            const baseSize = container.clientWidth;
            if (!baseSize) return;

            const cropDisplay = Math.round((template.bottomCrop / PREVIEW_SOURCE_SIZE) * baseSize);
            const visibleHeight = Math.max(40, baseSize - cropDisplay);
            container.style.height = `${visibleHeight}px`;
        }

        function getCurrentTemplateSnapshot() {
            return {
                baseHeading: template.baseHeading,
                bottomCrop: template.bottomCrop,

        function applyTemplateState(state) {

            if (cropValue) cropValue.textContent = `${template.bottomCrop}px`;

            renderTemplateRows();
            updateSamplerTemplateSummary();
            applyPreviewCrop();
            requestAnimationFrame(applyPreviewCrop);

            if (previewPoint) {
                previewPoint.heading = template.baseHeading;

        function ensureCsvColumns(columnsToAdd) {
            let changed = false;
            (columnsToAdd || []).forEach((column) => {
                const key = String(column || '').trim();
                if (key && !csvColumns.includes(key)) {
                    csvColumns.push(key);
                    changed = true;
                }
            });
            return changed;
        }

        function toFiniteNumber(value, fallback) {
            const parsed = Number.parseFloat(value);
            return Number.isFinite(parsed) ? parsed : fallback;
        }

        function toFiniteInt(value, fallback) {
            const parsed = Number.parseInt(value, 10);
            return Number.isFinite(parsed) ? parsed : fallback;
        }

        function formatLocation(lat, lng) {
            return `${lat.toFixed(7)},${lng.toFixed(7)}`;
        }

        function parseLocation(locationValue) {
            const raw = String(locationValue || '').trim();
            if (!raw) return null;
            const parts = raw.split(/[;,]/).map((part) => part.trim()).filter(Boolean);
            if (parts.length < 2) return null;
            const lat = Number.parseFloat(parts[0]);
            const lng = Number.parseFloat(parts[1]);
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
            return { lat, lng };
        }

        function parseCSVMatrix(csvText) {
            const text = String(csvText || '').replace(/^\uFEFF/, '');
            const rows = [];
            let row = [];
            let value = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const ch = text[i];

                if (ch === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        value += '"';
                        i += 1;
                    } else {
                        inQuotes = !inQuotes;
                    }
                    continue;
                }

                if (!inQuotes && ch === ',') {
                    row.push(value);
                    value = '';
                    continue;
                }

                if (!inQuotes && (ch === '\n' || ch === '\r')) {
                    row.push(value);
                    value = '';
                    if (ch === '\r' && text[i + 1] === '\n') i += 1;
                    if (row.some((cell) => cell !== '')) rows.push(row);
                    row = [];
                    continue;
                }

                value += ch;
            }

            row.push(value);
            if (row.some((cell) => cell !== '')) rows.push(row);
            return rows;
        }

        function escapeCSVValue(value) {
            const text = value === null || value === undefined ? '' : String(value);
            if (/[",\n\r]/.test(text)) {
                return `"${text.replace(/"/g, '""')}"`;
            }
            return text;
        }

        function rowsToCSV(headers, rows) {
            const headerLine = headers.map(escapeCSVValue).join(',');
            const bodyLines = rows.map((row) => headers.map((header) => escapeCSVValue(row[header])).join(','));
            return [headerLine, ...bodyLines].join('\n');
        }

        function getObjectValueByKey(source, key) {
            if (!source || typeof source !== 'object') return undefined;
            if (Object.prototype.hasOwnProperty.call(source, key)) {
                return source[key];
            }
            const lowered = key.toLowerCase();
            const match = Object.keys(source).find((candidate) => candidate.toLowerCase() === lowered);
            return match ? source[match] : undefined;
        }

        function buildPointRowData(point, sourceRow = {}) {
            const source = sourceRow && typeof sourceRow === 'object' ? sourceRow : {};
            ensureCsvColumns(Object.keys(source));
            ensureCsvColumns(BASE_COLUMNS);

            const row = {};
            csvColumns.forEach((column) => {
                const rawValue = getObjectValueByKey(source, column);
                row[column] = rawValue !== undefined && rawValue !== null ? String(rawValue) : '';
            });

            row.street = row.street || `point_${Math.floor(point.id)}`;
            row.label = row.label || row.street;
            row.location = formatLocation(point.lat, point.lng);
            row.heading = String(point.heading);
            row.pitch = String(point.pitch);
            row.fov = String(point.fov);
            row.radius = String(point.radius);

            if (Object.prototype.hasOwnProperty.call(row, 'bottom_crop') && !String(row.bottom_crop).trim()) {
                row.bottom_crop = String(template.bottomCrop);
            }

            return row;
        }

        function buildExportRow(point, index) {
            const source = point.rowData && typeof point.rowData === 'object' ? point.rowData : {};
            const row = {};
            csvColumns.forEach((column) => {
                const rawValue = getObjectValueByKey(source, column);
                row[column] = rawValue !== undefined && rawValue !== null ? String(rawValue) : '';
            });

            if (!String(row.street || '').trim()) row.street = `point_${index + 1}`;
            if (!String(row.label || '').trim()) row.label = row.street;
            row.location = formatLocation(point.lat, point.lng);
            row.heading = String(point.heading);
            row.pitch = String(point.pitch);
            row.fov = String(point.fov);
            row.radius = String(point.radius);

            if (Object.prototype.hasOwnProperty.call(row, 'bottom_crop') && !String(row.bottom_crop).trim()) {
                row.bottom_crop = String(template.bottomCrop);
            }

            return row;
        }

        function createSeededRandom(seed) {
            let t = (seed >>> 0) || 1;
            return () => {
                t += 0x6D2B79F5;
                let r = Math.imul(t ^ (t >>> 15), t | 1);
                r ^= r + Math.imul(r ^ (r >>> 7), r | 61);
                return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
            };
        }

        function parseBBoxInput(text) {
            const parts = String(text || '').split(',').map((part) => part.trim());
            if (parts.length !== 4) {
                throw new Error('BBox must be min_lat,min_lng,max_lat,max_lng');
            }
            const [minLat, minLng, maxLat, maxLng] = parts.map((part) => Number.parseFloat(part));
            if (![minLat, minLng, maxLat, maxLng].every(Number.isFinite)) {
                throw new Error('BBox values must be numeric');
            }
            if (minLat >= maxLat || minLng >= maxLng) {
                throw new Error('BBox min values must be smaller than max values');
            }
            return { minLat, minLng, maxLat, maxLng };
        }

        function getTemplateDirectionSpecs() {
            const baseHeading = normalizeHeading(template.baseHeading);
            const normalized = normalizeDirections(template.directions);
            return normalized.map((entry, index) => ({
                heading: normalizeHeading(baseHeading + index * 45),
                pitch: Math.max(-90, Math.min(90, toFiniteInt(entry.pitch, 0))),
                fov: Math.max(30, Math.min(120, toFiniteInt(entry.fov, 80)))
            }));
        }

        function updateSamplerTemplateSummary() {
            const summary = document.getElementById('sampler-template-summary');
            if (!summary) return;

            const specs = getTemplateDirectionSpecs();
            const parts = specs.map((spec) => `H${spec.heading}/P${spec.pitch}/F${spec.fov}`);
            summary.textContent = `Using Preview template (${specs.length} dirs): ${parts.join(' | ')}`;
        }

        function extractPolygonPoints(payload) {
            let root = payload;
            if (root && root.type === 'FeatureCollection') {
                if (!Array.isArray(root.features) || !root.features.length) {
                    throw new Error('FeatureCollection has no features');
                }
                root = root.features[0];
            }

            if (root && root.type === 'Feature') {
                root = root.geometry;
            }

            if (!root || !root.type) {
                throw new Error('Invalid GeoJSON object');
            }

            let ring = null;
            if (root.type === 'Polygon') {
                ring = (root.coordinates || [])[0];
            } else if (root.type === 'MultiPolygon') {
                ring = (((root.coordinates || [])[0] || [])[0]);
            } else {
                throw new Error('GeoJSON must be Polygon or MultiPolygon');
            }

            if (!Array.isArray(ring) || ring.length < 3) {
                throw new Error('Polygon ring must have at least three points');
            }

            const first = ring[0];
            if (!Array.isArray(first) || first.length < 2) {
                throw new Error('Polygon coordinates are malformed');
            }

            const firstA = Number.parseFloat(first[0]);
            const firstB = Number.parseFloat(first[1]);
            if (!Number.isFinite(firstA) || !Number.isFinite(firstB)) {
                throw new Error('Polygon coordinates must be numeric');
            }

            const treatAsLatLng = Math.abs(firstA) <= 90 && Math.abs(firstB) > 90;
            return ring.map((coord) => {
                const a = Number.parseFloat(coord[0]);
                const b = Number.parseFloat(coord[1]);
                if (!Number.isFinite(a) || !Number.isFinite(b)) {
                    throw new Error('Polygon coordinates must be numeric');
                }
                return treatAsLatLng ? [a, b] : [b, a];
            });
        }

        function pointInPolygon(lat, lng, polygon) {
            if (!Array.isArray(polygon) || polygon.length < 3) return false;
            let inside = false;
            let j = polygon.length - 1;

            for (let i = 0; i < polygon.length; i++) {
                const latI = polygon[i][0];
                const lngI = polygon[i][1];
                const latJ = polygon[j][0];
                const lngJ = polygon[j][1];

                if ((lngI > lng) !== (lngJ > lng) && lngJ !== lngI) {
                    const boundaryLat = ((latJ - latI) * (lng - lngI)) / (lngJ - lngI) + latI;
                    if (lat < boundaryLat) inside = !inside;
                }

                j = i;
            }

            return inside;
        }

        function haversineM(lat1, lng1, lat2, lng2) {
            const radius = 6371000;
            const toRad = (value) => (value * Math.PI) / 180;
            const dLat = toRad(lat2 - lat1);
            const dLng = toRad(lng2 - lng1);
            const a =
                Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
            return 2 * radius * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        async function metadataCallWithRetry(location, radius, apiKey, retries = 4, backoffMs = 500) {
            let lastError = '';

            for (let attempt = 0; attempt < retries; attempt++) {
                try {
                    const params = new URLSearchParams({
                        location,
                        radius: String(radius),
                        key: apiKey
                    });
                    const response = await fetch(`https://maps.googleapis.com/maps/api/streetview/metadata?${params.toString()}`, {
                        method: 'GET',
                        cache: 'no-store'
                    });

                    if (!response.ok) {
                        if (response.status >= 500) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        return { status: 'failed', error: `HTTP ${response.status}` };
                    }

                    const data = await response.json();
                    if (data.status === 'OK') {
                        return {
                            status: 'ok',
                            pano_id: String(data.pano_id || ''),
                            pano_lat: Number.parseFloat(data.location && data.location.lat),
                            pano_lng: Number.parseFloat(data.location && data.location.lng),
                            pano_date: String(data.date || '')
                        };
                    }

                    return {
                        status: 'no_imagery',
                        api_status: String(data.status || 'UNKNOWN'),
                        error: String(data.error_message || '')
                    };
                } catch (error) {
                    lastError = error && error.message ? error.message : String(error);
                    if (attempt < retries - 1) {
                        await sleep(backoffMs * (2 ** attempt));
                    }
                }
            }

            return { status: 'failed', error: lastError || 'metadata request failed' };
        }

        function buildStreetAllocator() {
            const taken = new Set();
            let nextAuto = 1;

            points.forEach((point) => {
                const street = point && point.rowData ? String(getObjectValueByKey(point.rowData, 'street') || '').trim() : '';
                if (!street) return;
                taken.add(street);
                const match = street.match(/^auto_(\d+)$/);
                if (match) {
                    nextAuto = Math.max(nextAuto, Number.parseInt(match[1], 10) + 1);
                }
            });

            return () => {
                while (taken.has(`auto_${nextAuto}`)) {
                    nextAuto += 1;
                }
                const value = `auto_${nextAuto}`;
                taken.add(value);
                nextAuto += 1;
                return value;
            };
        }

        function updateAreaModeUI() {
            const mode = document.getElementById('sampler-area-mode').value;
            document.getElementById('sampler-bbox-wrap').style.display = mode === 'bbox' ? '' : 'none';
            document.getElementById('sampler-polygon-wrap').style.display = mode === 'polygon' ? '' : 'none';
        }

        function updateSamplerStatus(lines) {
            document.getElementById('sampler-status').textContent = Array.isArray(lines) ? lines.join('\n') : String(lines || '');
        }

        function updateBulkFetchStatus(lines) {
            const statusEl = document.getElementById('bulk-fetch-status');
            if (!statusEl) return;
            statusEl.textContent = Array.isArray(lines) ? lines.join('\n') : String(lines || '');
        }

        function sanitizePathSegment(value) {
            const normalized = String(value || '').trim() || 'point';
            return normalized
                .replace(/[\\/:*?"<>|]/g, '_')
                .replace(/\s+/g, '_')
                .replace(/_+/g, '_')
                .replace(/^_+|_+$/g, '')
                .slice(0, 80) || 'point';
        }

        function generateImageId(location, heading, pitch, fov) {
            const input = `${location}_${heading}_${pitch}_${fov}`;
            let hashA = 2166136261;
            let hashB = 2166136261;
            for (let i = 0; i < input.length; i++) {
                const code = input.charCodeAt(i);
                hashA ^= code;
                hashA = Math.imul(hashA, 16777619);

                hashB ^= (code + i);
                hashB = Math.imul(hashB, 2246822519);
            }
            const hexA = (hashA >>> 0).toString(16).padStart(8, '0');
            const hexB = (hashB >>> 0).toString(16).padStart(8, '0');
            return `${hexA}${hexB}`.slice(0, 12);
        }

        function resolvePointInputLocation(point) {
            const rowLocation = point && point.rowData ? getObjectValueByKey(point.rowData, 'location') : '';
            const parsed = parseLocation(rowLocation);
            if (parsed) return formatLocation(parsed.lat, parsed.lng);
            return formatLocation(point.lat, point.lng);
        }

        function resolvePointStreet(point, index) {
            const label = point && point.rowData ? String(getObjectValueByKey(point.rowData, 'label') || '').trim() : '';
            const street = point && point.rowData ? String(getObjectValueByKey(point.rowData, 'street') || '').trim() : '';
            return label || street || `point_${index + 1}`;
        }

        function buildImageManifestRow(target, metadata, status, filePath) {
            return {
                image_id: target.imageId,
                file_path: filePath || '',
                split: 'unset',
                parent_image_id: '',
                is_synthetic: '0',
                edit_type: 'none',
                expected_inserted_class: 'none',
                street: target.street,
                input_location: target.location,
                heading: String(target.heading),
                pitch: String(target.pitch),
                fov: String(target.fov),
                pano_id: metadata && metadata.pano_id ? String(metadata.pano_id) : '',
                pano_lat: metadata && Number.isFinite(metadata.pano_lat) ? String(metadata.pano_lat) : '',
                pano_lng: metadata && Number.isFinite(metadata.pano_lng) ? String(metadata.pano_lng) : '',
                status,
                num_boxes_autogen: '0',
                needs_review: '0',
                review_status: 'todo',
                created_at: new Date().toISOString()
            };
        }

        async function fetchStreetViewImageBlob(target, apiKey, imageSize, retries = 3, backoffMs = 700) {
            let lastError = '';

            for (let attempt = 0; attempt < retries; attempt++) {
                try {
                    const params = new URLSearchParams({
                        location: target.location,
                        heading: String(target.heading),
                        pitch: String(target.pitch),
                        fov: String(target.fov),
                        radius: String(target.radius),
                        key: apiKey,
                        return_error_code: 'true',
                        size: `${imageSize}x${imageSize}`,
                        format: 'jpg'
                    });

                    trackApiCall();
                    const response = await fetch(`https://maps.googleapis.com/maps/api/streetview?${params.toString()}`, {
                        method: 'GET',
                        cache: 'no-store'
                    });

                    if (!response.ok) {
                        if (response.status >= 500) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        return { ok: false, error: `HTTP ${response.status}` };
                    }

                    const contentType = String(response.headers.get('Content-Type') || '').toLowerCase();
                    if (!contentType.includes('image')) {
                        const bodyText = await response.text();
                        return {
                            ok: false,
                            error: `Non-image response (${contentType || 'unknown'}): ${bodyText.slice(0, 120)}`
                        };
                    }

                    const blob = await response.blob();
                    return { ok: true, blob };
                } catch (error) {
                    lastError = error && error.message ? error.message : String(error);
                    if (attempt < retries - 1) {
                        await sleep(backoffMs * (2 ** attempt));
                    }
                }
            }

            return { ok: false, error: lastError || 'Image request failed' };
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = filename;
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            URL.revokeObjectURL(url);
        }

        async function fetchStreetViewBatch() {
            if (isBulkFetching) return;

            const runBtn = document.getElementById('bulk-fetch-btn');

            try {
                isBulkFetching = true;
                runBtn.disabled = true;
                runBtn.textContent = 'Fetching...';

                if (!window.JSZip) {
                    throw new Error('JSZip failed to load. Refresh and try again.');
                }

                const scope = document.getElementById('bulk-fetch-scope').value;
                const imageSize = Math.max(128, Math.min(2048, toFiniteInt(document.getElementById('bulk-fetch-size').value, 640)));
                const apiKey = (document.getElementById('sampler-api-key').value || '').trim() || GSV_API_KEY;
                if (!apiKey) {
                    throw new Error('No API key available. Set API Key Override or GSV_API_KEY in page config.');
                }

                const sourcePoints = scope === 'selected'
                    ? points.filter((point) => selectedIds.has(point.id))
                    : [...points];

                if (!sourcePoints.length) {
                    throw new Error(scope === 'selected' ? 'No selected points to fetch.' : 'No points available to fetch.');
                }

                const targets = [];
                const seenIds = new Set();

                sourcePoints.forEach((point, idx) => {
                    const location = resolvePointInputLocation(point);
                    const heading = normalizeHeading(point.heading);
                    const pitch = Math.max(-90, Math.min(90, toFiniteInt(point.pitch, 0)));
                    const fov = Math.max(30, Math.min(120, toFiniteInt(point.fov, 80)));
                    const radius = Math.max(1, toFiniteInt(point.radius, 50));
                    const street = resolvePointStreet(point, idx);
                    const imageId = generateImageId(location, heading, pitch, fov);

                    if (seenIds.has(imageId)) return;
                    seenIds.add(imageId);

                    targets.push({
                        imageId,
                        street,
                        safeStreet: sanitizePathSegment(street),
                        location,
                        heading,
                        pitch,
                        fov,
                        radius
                    });
                });

                const zip = new JSZip();
                const manifestRows = [];

                let okCount = 0;
                let noImageryCount = 0;
                let failedCount = 0;

                updateBulkFetchStatus([
                    `scope=${scope}`,
                    `targets=${targets.length}`,
                    `image_size=${imageSize}`,
                    'starting...'
                ]);

                for (let i = 0; i < targets.length; i++) {
                    const target = targets[i];
                    updateBulkFetchStatus([
                        `scope=${scope}`,
                        `progress=${i + 1}/${targets.length}`,
                        `ok=${okCount}`,
                        `no_imagery=${noImageryCount}`,
                        `failed=${failedCount}`,
                        `image_id=${target.imageId}`
                    ]);

                    const metadata = await metadataCallWithRetry(target.location, target.radius, apiKey);

                    if (metadata.status !== 'ok') {
                        const status = metadata.status === 'no_imagery' ? 'no_imagery' : 'failed';
                        if (status === 'no_imagery') noImageryCount += 1;
                        else failedCount += 1;

                        manifestRows.push(buildImageManifestRow(target, metadata, status, ''));
                        continue;
                    }

                    const imageResp = await fetchStreetViewImageBlob(target, apiKey, imageSize);
                    if (!imageResp.ok) {
                        failedCount += 1;
                        manifestRows.push(buildImageManifestRow(target, metadata, 'failed', ''));
                        continue;
                    }

                    const relativePath = `data/images_original/${target.safeStreet}/${target.imageId}.jpg`;
                    zip.file(relativePath, imageResp.blob);
                    manifestRows.push(buildImageManifestRow(target, metadata, 'ok', relativePath));
                    okCount += 1;
                }

                zip.file('manifests/images.csv', rowsToCSV(IMAGE_MANIFEST_COLUMNS, manifestRows));
                zip.file('README_FETCH.txt', [
                    'Street View batch export from Point Manager',
                    `Generated at: ${new Date().toISOString()}`,
                    `Targets: ${targets.length}`,
                    `OK images: ${okCount}`,
                    `No imagery: ${noImageryCount}`,
                    `Failed: ${failedCount}`,
                    '',
                    'Extract this ZIP into the project root to populate data/images_original and manifests/images.csv.'
                ].join('\n'));

                updateBulkFetchStatus('Packing ZIP...');
                const zipBlob = await zip.generateAsync({ type: 'blob' });

                const stamp = new Date().toISOString().replace(/[:.]/g, '-');
                downloadBlob(zipBlob, `streetview_fetch_${stamp}.zip`);

                updateBulkFetchStatus([
                    `completed targets=${targets.length}`,
                    `ok=${okCount}`,
                    `no_imagery=${noImageryCount}`,
                    `failed=${failedCount}`,
                    'ZIP downloaded to your browser Downloads folder.'
                ]);
            } catch (error) {
                updateBulkFetchStatus(`Fetch failed: ${error && error.message ? error.message : String(error)}`);
            } finally {
                isBulkFetching = false;
                runBtn.disabled = false;
                runBtn.textContent = 'Fetch & Download ZIP';
            }
        }
