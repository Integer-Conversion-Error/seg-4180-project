<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Synthetic Cleanup Harness</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --tile: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
      --border: #374151;
      --selected: #2563eb;
      --tile-base-size: 255px;
      --tile-scale: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    .toolbar .group { display: flex; gap: 8px; align-items: center; }
    .toolbar .grow { flex: 1; }

    button, select {
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { border-color: #4b5563; }
    .danger { background: #2a1111; border-color: #7f1d1d; color: #fecaca; }
    .danger:hover { background: #3b1010; }

    .status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .zoom-label {
      min-width: 56px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .grid-wrap {
      overflow: auto;
      padding: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(calc(var(--tile-base-size) * var(--tile-scale)), 1fr));
      gap: 10px;
    }

    .tile {
      position: relative;
      background: var(--tile);
      border: 2px solid transparent;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      min-height: 160px;
    }

    .tile.selected {
      border-color: var(--selected);
      box-shadow: 0 0 0 1px #1d4ed8 inset;
    }

    .tile img {
      width: 100%;
      height: calc(var(--tile-base-size) * var(--tile-scale));
      object-fit: cover;
      display: block;
      background: #111827;
    }

    .meta {
      padding: 6px 8px 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .meta .name {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      color: #cbd5e1;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
    <a href="/" style="display:inline-block; margin: 10px 20px; text-decoration: none; color: #2563eb; font-weight: bold;">&larr; Back to Tools</a>
  <div class="app">
    <div class="toolbar">
      <div class="group">
        <label for="classFilter">Class:</label>
        <select id="classFilter">
          <option value="">All</option>
        </select>
      </div>
      <div class="group">
        <button id="prevBtn">Prev</button>
        <button id="nextBtn">Next</button>
        <span id="pageInfo" class="status">Page 1</span>
      </div>
      <div class="group">
        <button id="selectPageBtn">Select page</button>
        <button id="clearSelBtn">Clear</button>
        <button id="deleteBtn" class="danger">Delete selected</button>
      </div>
      <div class="group">
        <button id="zoomOutBtn">-20%</button>
        <span id="zoomLabel" class="zoom-label">100%</span>
        <button id="zoomInBtn">+20%</button>
      </div>
      <div class="grow"></div>
      <div id="status" class="status">Loading...</div>
    </div>

    <div class="grid-wrap">
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <script>
    const PAGE_SIZE = 500;

    let page = 1;
    let totalPages = 1;
    let currentItems = [];
    let selected = new Set();
    let lastClickedIndex = null;
    let tileScale = 1;

    const gridEl = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    const pageInfoEl = document.getElementById("pageInfo");
    const classFilterEl = document.getElementById("classFilter");
    const zoomLabelEl = document.getElementById("zoomLabel");

    function applyTileScale() {
      document.documentElement.style.setProperty("--tile-scale", String(tileScale));
      zoomLabelEl.textContent = `${Math.round(tileScale * 100)}%`;
    }

    function changeTileScale(delta) {
      const next = Number((tileScale + delta).toFixed(2));
      tileScale = Math.max(0.4, Math.min(3, next));
      applyTileScale();
    }

    async function loadClasses() {
      const res = await fetch("/api/cleanup/classes");
      const classes = await res.json();
      for (const c of classes) {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        classFilterEl.appendChild(opt);
      }
    }

    async function loadPage() {
      statusEl.textContent = "Loading images...";
      const cls = encodeURIComponent(classFilterEl.value || "");
      const res = await fetch(`/api/cleanup/images?page=${page}&page_size=${PAGE_SIZE}&class=${cls}`);
      const data = await res.json();

      currentItems = data.items || [];
      totalPages = data.paging?.total_pages || 1;
      page = data.paging?.page || 1;

      renderGrid();
      pageInfoEl.textContent = `Page ${page} / ${totalPages} (${data.paging?.total_items || 0} total)`;
      statusEl.textContent = `${selected.size} selected`;
    }

    function renderGrid() {
      gridEl.innerHTML = "";
      currentItems.forEach((item, idx) => {
        const tile = document.createElement("div");
        tile.className = "tile" + (selected.has(item.id) ? " selected" : "");
        tile.dataset.id = item.id;

        tile.innerHTML = `
          <img loading="lazy" src="${item.url}" alt="${item.filename}">
          <div class="badge">${item.class_name}</div>
          <div class="meta">
            <div class="name">${item.filename}</div>
            <div>${item.relative_path}</div>
          </div>
        `;

        tile.addEventListener("click", (ev) => {
          if (ev.shiftKey && lastClickedIndex !== null) {
            const start = Math.min(lastClickedIndex, idx);
            const end = Math.max(lastClickedIndex, idx);
            const shouldSelect = !selected.has(item.id);
            for (let i = start; i <= end; i++) {
              const id = currentItems[i].id;
              if (shouldSelect) selected.add(id); else selected.delete(id);
            }
          } else {
            if (selected.has(item.id)) selected.delete(item.id); else selected.add(item.id);
            lastClickedIndex = idx;
          }
          renderGrid();
          statusEl.textContent = `${selected.size} selected`;
        });

        gridEl.appendChild(tile);
      });
    }

    async function deleteSelected() {
      if (selected.size === 0) {
        alert("No images selected.");
        return;
      }
      const ok = confirm(`Delete ${selected.size} selected image(s)? They will be moved to deleted_images/synthetic_cleanup.`);
      if (!ok) return;

      statusEl.textContent = "Deleting...";
      const relative_paths = [...selected];
      const res = await fetch("/api/cleanup/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ relative_paths })
      });
      const out = await res.json();

      if (!res.ok) {
        alert(out.error || "Delete failed.");
        statusEl.textContent = "Delete failed";
        return;
      }

      selected.clear();
      lastClickedIndex = null;
      await loadPage();
      statusEl.textContent = `Deleted ${out.count || 0}; skipped ${(out.skipped || []).length}`;
    }

    document.getElementById("prevBtn").addEventListener("click", async () => {
      if (page > 1) {
        page -= 1;
        await loadPage();
      }
    });

    document.getElementById("nextBtn").addEventListener("click", async () => {
      if (page < totalPages) {
        page += 1;
        await loadPage();
      }
    });

    document.getElementById("selectPageBtn").addEventListener("click", () => {
      for (const item of currentItems) selected.add(item.id);
      renderGrid();
      statusEl.textContent = `${selected.size} selected`;
    });

    document.getElementById("clearSelBtn").addEventListener("click", () => {
      selected.clear();
      lastClickedIndex = null;
      renderGrid();
      statusEl.textContent = "0 selected";
    });

    document.getElementById("deleteBtn").addEventListener("click", deleteSelected);
    document.getElementById("zoomInBtn").addEventListener("click", () => changeTileScale(0.2));
    document.getElementById("zoomOutBtn").addEventListener("click", () => changeTileScale(-0.2));

    classFilterEl.addEventListener("change", async () => {
      page = 1;
      selected.clear();
      lastClickedIndex = null;
      await loadPage();
    });

    (async () => {
      applyTileScale();
      await loadClasses();
      await loadPage();
    })();
  </script>
</body>
</html>
