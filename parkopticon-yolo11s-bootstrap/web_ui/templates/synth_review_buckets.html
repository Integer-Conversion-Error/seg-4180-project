<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Synthetic Review Buckets</title>
  <style>
    :root {
      --card-base-size: 220px;
      --card-scale: 1;
      --bg: #eef2ff;
      --panel: #ffffff;
      --panel-border: #dbe4ff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #059669;
      --danger: #dc2626;
      --warning: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 16px;
      color: var(--text);
      background:
        radial-gradient(circle at 100% 0%, #dbeafe 0%, #eef2ff 35%, #f8fafc 100%);
    }
    .toolbar {
      display: grid;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 12px 35px rgba(15, 23, 42, 0.08);
      z-index: 1000;
    }
    .toolbar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 10px;
    }
    .toolbar-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      border: 1px solid #e2e8f0;
      background: var(--panel);
      border-radius: 10px;
      padding: 10px;
      min-height: 56px;
    }
    .toolbar-section.wide {
      grid-column: span 2;
    }
    .section-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-right: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(calc(var(--card-base-size) * var(--card-scale)), 1fr)); gap: 10px; }
    .card { border: 2px solid transparent; background: white; border-radius: 10px; overflow: hidden; cursor: pointer; box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05); }
    .card.selected { border-color: #2563eb; }
    .card img { width: 100%; height: auto; aspect-ratio: 640 / 610; object-fit: contain; display: block; background: #e5e7eb; }
    .meta { padding: 8px; font-size: 12px; color: #374151; }
    button, select, input {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: var(--text);
      font-size: 13px;
    }
    button {
      cursor: pointer;
      font-weight: 600;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
    }
    button:hover {
      border-color: #93c5fd;
      background: #f8fafc;
    }
    button:active {
      transform: translateY(1px);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .btn-primary {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .btn-success {
      border-color: #a7f3d0;
      background: #ecfdf5;
      color: #065f46;
    }
    .btn-danger {
      border-color: #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }
    .btn-warning {
      border-color: #fde68a;
      background: #fffbeb;
      color: #92400e;
    }
    .zoom-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 2px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      background: #f8fafc;
    }
    .status-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: auto;
    }
    .status-chip {
      color: #475569;
      font-size: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      background: #f8fafc;
      padding: 5px 10px;
      white-space: nowrap;
    }
    .cost-chip {
      color: #334155;
      background: #f1f5f9;
    }
    .zoom-label { min-width: 50px; text-align: center; color: #6b7280; font-size: 13px; }
    #touchupPromptSelect { min-width: 250px; }
    #touchupProviderSelect { min-width: 160px; }
    #customPrompt { min-width: 320px; }
    #newPresetName { min-width: 120px; }
    #newPresetPrompt { min-width: 220px; }
    #customPresetsSelect { min-width: 160px; }
    
    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #eee;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .modal-body {
      display: flex;
      gap: 24px;
      padding: 24px;
      overflow: auto;
    }
    .modal-image-container {
      flex: 1;
      text-align: center;
    }
    .modal-image-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    .modal-image {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 16px 24px;
      border-top: 1px solid #eee;
    }
    .btn-accept {
      background: #10b981;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-accept:hover {
      background: #059669;
    }
    .btn-reject {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reject:hover {
      background: #dc2626;
    }
    .btn-secondary {
      background: #6b7280;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:hover {
      background: #4b5563;
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top-color: #3b82f6;
      animation: spin 1s ease-in-out infinite;
      vertical-align: middle;
      margin-left: 8px;
    }
    .batch-modal {
      width: min(1800px, 98vw);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }
    .batch-intro {
      padding: 12px 24px 0;
      color: #374151;
      font-size: 13px;
      line-height: 1.4;
    }
    .batch-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 24px 4px;
      align-items: center;
    }
    .batch-toolbar button {
      border: none;
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 6px;
    }
    .btn-all-apply { background: #10b981; }
    .btn-all-keep { background: #4b5563; }
    .btn-all-reject { background: #ef4444; }
    .btn-regenerate-focused { background: #2563eb; }
    .regenerate-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 24px 10px;
      border-bottom: 1px solid #e5e7eb;
      align-items: center;
      background: #f9fafb;
    }
    .regenerate-controls select,
    .regenerate-controls input {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 8px;
      font-size: 13px;
      min-width: 230px;
    }
    .regenerate-controls button {
      border: none;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      background: #2563eb;
      cursor: pointer;
    }
    .regen-hint {
      font-size: 12px;
      color: #6b7280;
      width: 100%;
    }
    .batch-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 24px 10px;
      border-bottom: 1px solid #e5e7eb;
    }
    .summary-pill {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .summary-apply { background: #d1fae5; color: #065f46; }
    .summary-keep { background: #e5e7eb; color: #374151; }
    .summary-reject { background: #fee2e2; color: #991b1b; }
    .summary-failed { background: #fef3c7; color: #92400e; }
    .batch-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px;
    }
    .batch-row {
      display: grid;
      grid-template-columns: auto auto 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
      border-radius: 8px;
    }
    .batch-row.focused {
      background: #eff6ff;
      outline: 2px solid #bfdbfe;
      outline-offset: -2px;
    }
    .batch-image-wrap {
      width: 500px;
      max-width: 50vw;
    }
    .batch-image-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .batch-image {
      width: 100%;
      height: auto;
      border-radius: 7px;
      border: 1px solid #e5e7eb;
      display: block;
      background: #f3f4f6;
    }
    .batch-meta {
      min-width: 230px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: flex-start;
    }
    .batch-id {
      font-size: 12px;
      color: #374151;
      font-weight: 600;
      word-break: break-all;
    }
    .decision-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .decision-btn {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: white;
      color: #374151;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .decision-btn.active-apply {
      background: #10b981;
      color: white;
      border-color: #10b981;
    }
    .decision-btn.active-keep {
      background: #4b5563;
      color: white;
      border-color: #4b5563;
    }
    .decision-btn.active-reject {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }
    .decision-btn.regen-btn {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }
    .decision-btn.regen-btn:disabled {
      background: #9ca3af;
      border-color: #9ca3af;
      cursor: not-allowed;
    }
    .decision-hint {
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.4;
    }
    .batch-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-top: 1px solid #e5e7eb;
      background: #ffffff;
    }
    .batch-footer-note {
      color: #6b7280;
      font-size: 12px;
    }
    @media (max-width: 1100px) {
      .toolbar-section.wide {
        grid-column: span 1;
      }
      .status-chips {
        margin-left: 0;
        width: 100%;
      }
      #customPrompt,
      #newPresetPrompt {
        min-width: 240px;
      }
      .batch-row {
        grid-template-columns: 1fr;
      }
      .batch-image-wrap {
        width: 100%;
        max-width: none;
      }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <a href="/" style="display:inline-block; margin-bottom: 12px; text-decoration:none; color:#2563eb;">&larr; Back to Tools</a>
  <div class="toolbar">
    <div class="toolbar-grid">
      <div class="toolbar-section">
        <span class="section-label">Filters</span>
        <select id="bucketSel">
          <option value="">All Buckets</option>
          <option value="EV-SNV">EV-SNV</option>
          <option value="EV-SE">EV-SE</option>
          <option value="SVO-E">SVO-E</option>
          <option value="SVO-NV">SVO-NV</option>
        </select>
        <select id="statusSel">
          <option value="todo">todo</option>
          <option value="approved">approved</option>
          <option value="rejected">rejected</option>
          <option value="edited">edited</option>
          <option value="">all</option>
        </select>
        <button id="reloadBtn" class="btn-primary">Reload</button>
        <button id="selectShownBtn">Select Shown</button>
        <button id="clearSelectionBtn">Clear Selection</button>
      </div>

      <div class="toolbar-section">
        <span class="section-label">Review Status</span>
        <button id="approveBtn" class="btn-success">Mark Approved</button>
        <button id="rejectBtn" class="btn-danger">Mark Rejected</button>
        <button id="editedBtn" class="btn-warning">Mark Edited</button>
      </div>

      <div class="toolbar-section wide">
        <span class="section-label">Touchup</span>
        <select id="touchupPromptSelect" title="Select prompt used for regeneration">
          <option value="">Loading prompts...</option>
        </select>
        <select id="touchupProviderSelect" title="Select provider used for touchup edits">
          <option value="gemini">Provider: Gemini</option>
          <option value="grok">Provider: Grok</option>
          <option value="flux">Provider: Flux</option>
        </select>
        <input id="customPrompt" type="text" placeholder="Custom prompt text (used when Custom prompt is selected)" />
        <button id="regenerateBtn" class="btn-primary" title="Regenerate selected images using the prompt selected in dropdown">Regenerate Selected</button>
        <button id="goToPlaygroundBtn" title="Open selected images in Touchup Playground">Go to Playground</button>
      </div>

      <div id="presetManagement" class="toolbar-section wide">
        <span class="section-label">Custom Presets</span>
        <input id="newPresetName" type="text" placeholder="Preset name" />
        <input id="newPresetPrompt" type="text" placeholder="Prompt text" />
        <button id="savePresetBtn">Save as Preset</button>
        <select id="customPresetsSelect">
          <option value="">Custom Presets</option>
        </select>
        <button id="loadPresetBtn">Load Preset</button>
        <button id="deletePresetBtn">Delete Preset</button>
      </div>

      <div class="toolbar-section wide">
        <span class="section-label">View</span>
        <div class="zoom-group">
          <button id="zoomOutBtn">-20%</button>
          <span id="zoomLabel" class="zoom-label">100%</span>
          <button id="zoomInBtn">+20%</button>
        </div>
        <div class="status-chips">
          <span id="statusText" class="status-chip">Loading...</span>
          <span id="costSummary" class="status-chip cost-chip">Cost total: $0.000000 | Grok: $0.000000 | Gemini: $0.000000 | Flux: $0.000000</span>
        </div>
      </div>
    </div>
  </div>

  <div id="grid" class="grid"></div>

  <script>
    const grid = document.getElementById('grid');
    const statusText = document.getElementById('statusText');
    const bucketSel = document.getElementById('bucketSel');
    const statusSel = document.getElementById('statusSel');
    const touchupPromptSelect = document.getElementById('touchupPromptSelect');
    const touchupProviderSelect = document.getElementById('touchupProviderSelect');
    const costSummary = document.getElementById('costSummary');
    const customPrompt = document.getElementById('customPrompt');
    const zoomLabelEl = document.getElementById('zoomLabel');
    const selectShownBtn = document.getElementById('selectShownBtn');
    const clearSelectionBtn = document.getElementById('clearSelectionBtn');
    let items = [];
    let selected = new Set();
    let cardScale = 1;
    const customPresetPromptMap = new Map();
    const touchupPromptMap = new Map();

    function applyCardScale() {
      document.documentElement.style.setProperty('--card-scale', String(cardScale));
      zoomLabelEl.textContent = `${Math.round(cardScale * 100)}%`;
    }

    function changeCardScale(delta) {
      const next = Number((cardScale + delta).toFixed(2));
      cardScale = Math.max(0.4, Math.min(3, next));
      applyCardScale();
    }

    function updateSelectionToolbarState() {
      const shownCount = items.length;
      const selectedCount = selected.size;
      const bucketLabel = bucketSel.value || 'all buckets';
      const statusLabel = statusSel.value || 'all statuses';
      statusText.textContent = `${selectedCount} selected / ${shownCount} shown (${bucketLabel}, ${statusLabel})`;
      selectShownBtn.disabled = shownCount === 0 || selectedCount === shownCount;
      clearSelectionBtn.disabled = selectedCount === 0;
    }

    function selectAllShown() {
      selected.clear();
      for (const item of items) {
        selected.add(item.image_id);
      }
      render();
      updateSelectionToolbarState();
    }

    function clearSelection() {
      selected.clear();
      render();
      updateSelectionToolbarState();
    }

    function getSelectedTouchupConfig(promptSelectEl = touchupPromptSelect, customPromptInputEl = customPrompt) {
      const selectedValue = promptSelectEl.value || 'custom:input';
      const selectedLabel = promptSelectEl.options[promptSelectEl.selectedIndex]?.textContent || selectedValue;

      if (selectedValue.startsWith('prompt:')) {
        const promptId = selectedValue.slice('prompt:'.length);
        const promptText = touchupPromptMap.get(promptId);
        if (!promptText) {
          throw new Error(`Prompt '${promptId}' is unavailable. Reload prompts and try again.`);
        }
        return {
          promptMode: 'stored',
          promptId,
          customPromptText: null,
          promptLabel: selectedLabel,
        };
      }

      if (selectedValue.startsWith('mode:')) {
        const legacyMode = selectedValue.slice('mode:'.length);
        const legacyMap = {
          preset: 'improve_blending',
          improve_blending: 'improve_blending',
          fix_direction: 'fix_direction',
          fix_lighting: 'fix_lighting',
        };
        const promptId = legacyMap[legacyMode] || legacyMode;
        const promptText = touchupPromptMap.get(promptId);
        if (!promptText) {
          throw new Error(`Prompt '${promptId}' is unavailable. Reload prompts and try again.`);
        }
        return {
          promptMode: 'stored',
          promptId,
          customPromptText: null,
          promptLabel: selectedLabel,
        };
      }

      if (selectedValue === 'custom:input') {
        const typedPrompt = customPromptInputEl.value.trim();
        if (!typedPrompt) {
          throw new Error('Enter a custom prompt first, or choose a preset from the dropdown.');
        }
        return {
          promptMode: 'custom',
          customPromptText: typedPrompt,
          promptLabel: selectedLabel,
        };
      }

      throw new Error(`Unsupported prompt selection: ${selectedValue}`);
    }

    async function loadTouchupPromptsList() {
      try {
        const res = await fetch('/api/touchup-prompts');
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        const prompts = Array.isArray(data?.prompts) ? data.prompts : [];
        const previousPromptValue = touchupPromptSelect.value;

        touchupPromptMap.clear();
        touchupPromptSelect.innerHTML = '';

        for (const prompt of prompts) {
          const id = String(prompt?.id || '').trim();
          const name = String(prompt?.name || id).trim();
          const text = String(prompt?.prompt_text || '').trim();
          if (!id || !text) continue;

          touchupPromptMap.set(id, text);

          const option = document.createElement('option');
          option.value = `prompt:${id}`;
          option.textContent = `Prompt: ${name}`;
          touchupPromptSelect.appendChild(option);
        }

        const customOption = document.createElement('option');
        customOption.value = 'custom:input';
        customOption.textContent = 'Custom prompt (text input)';
        touchupPromptSelect.appendChild(customOption);

        if (!touchupPromptSelect.options.length) {
          touchupPromptSelect.innerHTML = '<option value="custom:input">Custom prompt (text input)</option>';
        }

        if ([...touchupPromptSelect.options].some((opt) => opt.value === previousPromptValue)) {
          touchupPromptSelect.value = previousPromptValue;
        } else if (touchupPromptSelect.options.length > 0) {
          touchupPromptSelect.selectedIndex = 0;
        }
      } catch (error) {
        console.error('Failed to load touchup prompts:', error);
        touchupPromptSelect.innerHTML = '<option value="custom:input">Custom prompt (text input)</option>';
      }
    }

    function getSelectedTouchupProvider(providerSelectEl = touchupProviderSelect) {
      const value = String(providerSelectEl.value || '').trim().toLowerCase();
      return ['grok', 'gemini', 'flux'].includes(value) ? value : 'gemini';
    }

    function fmtUsd(value) {
      return `$${Number(value || 0).toFixed(6)}`;
    }

    async function refreshCostSummary() {
      try {
        const res = await fetch('/api/synth/costs');
        if (!res.ok) return;
        const data = await res.json();
        const totals = data?.totals || {};
        const providers = totals?.providers || {};
        costSummary.textContent = `Cost total: ${fmtUsd(totals?.overall_usd)} | Grok: ${fmtUsd(providers?.grok?.usd)} | Gemini: ${fmtUsd(providers?.gemini?.usd)} | Flux: ${fmtUsd(providers?.flux?.usd)}`;
      } catch (_err) {
        // Keep default placeholder if unavailable.
      }
    }

    async function initializeTouchupProviders() {
      try {
        const res = await fetch('/api/synth/models');
        if (!res.ok) return;
        const data = await res.json();
        const provider = String(data?.default_touchup_provider || '').toLowerCase();
        if (['grok', 'gemini', 'flux'].includes(provider)) {
          touchupProviderSelect.value = provider;
        }
      } catch (_err) {
        // Keep static default when model metadata is unavailable.
      }
    }

    async function loadItems() {
      const bucket = encodeURIComponent(bucketSel.value || '');
      const status = encodeURIComponent(statusSel.value || '');
      statusText.textContent = 'Loading...';
      const res = await fetch(`/api/synth/review-buckets/items?bucket=${bucket}&status=${status}&limit=1000`);
      const data = await res.json();
      items = data.items || [];
      selected.clear();
      render();
      updateSelectionToolbarState();
    }

    function render() {
      grid.innerHTML = '';
      for (const item of items) {
        const card = document.createElement('div');
        card.className = `card${selected.has(item.image_id) ? ' selected' : ''}`;

     // Worker pool: run up to `concurrency` tasks in parallel, return all results in order
     async function runWithPool(tasks, concurrency) {
       const results = new Array(tasks.length);
       let nextIdx = 0;

       async function worker() {
         while (nextIdx < tasks.length) {
           const idx = nextIdx++;
           try {
             results[idx] = { ok: true, value: await tasks[idx]() };
           } catch (err) {
             results[idx] = { ok: false, error: err };
           }
         }
       }

       const workers = Array.from({ length: Math.min(concurrency, tasks.length) }, worker);
       await Promise.all(workers);
       return results;
     }

     async function touchup() {
       const selectedItems = items.filter((x) => selected.has(x.image_id));
       if (!selectedItems.length) return;

        let promptConfig;
        try {
          promptConfig = getSelectedTouchupConfig();
        } catch (err) {
          alert(err.message || String(err));
          return;
        }
        const selectedProvider = getSelectedTouchupProvider();

        const WORKER_POOL_SIZE = 24;

       // Build overlay showing live progress
       const progressOverlay = document.createElement('div');
       progressOverlay.className = 'modal-overlay';
       let doneCount = 0;
       const total = selectedItems.length;
       const updateProgress = () => {
         progressOverlay.querySelector('.progress-text').textContent =
           `Generating touchups… ${doneCount} / ${total}`;
         progressOverlay.querySelector('.progress-bar-fill').style.width =
           `${Math.round((doneCount / total) * 100)}%`;
       };
       progressOverlay.innerHTML = `
         <div class="modal-content" style="min-width:360px; padding:32px; text-align:center;">
           <div class="progress-text" style="margin-bottom:16px; font-size:15px; color:#374151;">Generating touchups… 0 / ${total}</div>
           <div style="background:#e5e7eb; border-radius:999px; height:10px; overflow:hidden;">
             <div class="progress-bar-fill" style="height:100%; width:0%; background:#3b82f6; transition:width 0.2s;"></div>
           </div>
             <div style="margin-top:12px; color:#9ca3af; font-size:12px;">${WORKER_POOL_SIZE} workers · ${total} image${total !== 1 ? 's' : ''}</div>
             <div style="margin-top:4px; color:#6b7280; font-size:12px;">Provider: ${selectedProvider}</div>
             <div style="margin-top:4px; color:#6b7280; font-size:12px;">Prompt: ${promptConfig.promptLabel}</div>
           </div>
         `;
        document.body.appendChild(progressOverlay);

       // Fire all touchup API calls in parallel via pool
        const tasks = selectedItems.map((item) => async () => {
           const payload = {
             image_relative_path: item.relative_path,
              prompt_mode: promptConfig.promptMode,
              provider: selectedProvider,
            };
            if (promptConfig.promptMode === 'stored') {
              payload.prompt_id = promptConfig.promptId;
            } else if (promptConfig.promptMode === 'custom') {
              payload.prompt_mode = 'custom';
              payload.custom_prompt = promptConfig.customPromptText;
            }
          try {
            const res = await fetch('/api/synth/touchup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.detail || 'Touchup failed');
            console.log('Touchup prompt:', data.prompt_used);
            return { item, touchupPath: data.image, isTemp: data.is_temp || false };
          } finally {
            doneCount++;
            updateProgress();
          }
        });

       const poolResults = await runWithPool(tasks, WORKER_POOL_SIZE);
       progressOverlay.remove();

       // Partition successes and failures
       const successes = poolResults.filter((r) => r.ok).map((r) => r.value);
       const failures = poolResults.filter((r) => !r.ok);

       if (failures.length > 0) {
         const msgs = failures.map((r) => r.error?.message || 'Unknown error');
         console.warn('Some touchups failed:', msgs);
         if (successes.length === 0) {
           alert(`All ${failures.length} touchup(s) failed.\n\n${msgs.slice(0, 5).join('\n')}`);
           return;
         }
       }

       // Show batch preview for all successes, then reload
       if (successes.length > 0) {
         await showBatchPreviewModal(successes, failures.length);
       }

       await loadItems();
     }

     async function showBatchPreviewModal(results, failureCount) {
       return new Promise((resolve) => {
         const overlay = document.createElement('div');
         overlay.className = 'modal-overlay';

         // Decision states: apply_touchup, keep_original, reject_image
         const states = results.map(() => 'apply_touchup');
         const regenerating = results.map(() => false);
         let focusedIdx = 0;
         let modalClosed = false;

         function getCounts() {
           let apply = 0;
           let keep = 0;
           let reject = 0;
           for (const state of states) {
             if (state === 'apply_touchup') apply += 1;
             else if (state === 'keep_original') keep += 1;
             else reject += 1;
           }
           return { apply, keep, reject };
         }

         function buttonClass(state, target) {
           const base = 'decision-btn';
           if (state !== target) return base;
           if (target === 'apply_touchup') return `${base} active-apply`;
           if (target === 'keep_original') return `${base} active-keep`;
           return `${base} active-reject`;
         }

         function buildRows() {
           return results
             .map((r, i) => {
               const state = states[i];
               const touchupUrl = `/files/${r.touchupPath}?t=${Date.now()}`;
                return `
                  <div class="batch-row${i === focusedIdx ? ' focused' : ''}" data-idx="${i}" data-row-index="${i}" tabindex="0">
                   <div class="batch-image-wrap">
                     <div class="batch-image-label">Current image</div>
                     <img class="batch-image" src="${r.item.url}" alt="Current ${r.item.image_id}" />
                   </div>
                   <div class="batch-image-wrap">
                     <div class="batch-image-label">Touchup candidate</div>
                     <img class="batch-image" src="${touchupUrl}" alt="Touchup ${r.item.image_id}" />
                   </div>
                   <div class="batch-meta">
                     <div class="batch-id">${r.item.image_id}</div>
                      <div class="decision-group">
                        <button class="${buttonClass(state, 'apply_touchup')}" data-idx="${i}" data-decision="apply_touchup">Use touchup</button>
                        <button class="${buttonClass(state, 'keep_original')}" data-idx="${i}" data-decision="keep_original">Keep original</button>
                        <button class="${buttonClass(state, 'reject_image')}" data-idx="${i}" data-decision="reject_image">Reject image</button>
                        <button class="decision-btn regen-btn" data-idx="${i}" data-row-regenerate="${i}" ${regenerating[i] ? 'disabled' : ''}>${regenerating[i] ? 'Regenerating...' : 'Regenerate'}</button>
                      </div>
                      <div class="decision-hint">Use touchup = overwrite image + mark edited. Keep original = no file/status change. Reject image = mark rejected.</div>
                    </div>
                  </div>
                `;
             })
             .join('');
         }

         function updateSummary() {
           const c = getCounts();
           overlay.querySelector('#pillApply').textContent = `Use touchup: ${c.apply}`;
           overlay.querySelector('#pillKeep').textContent = `Keep original: ${c.keep}`;
           overlay.querySelector('#pillReject').textContent = `Reject image: ${c.reject}`;
           overlay.querySelector('#batchApply').textContent =
             c.apply || c.reject
               ? `Apply decisions (${c.apply} edit${c.apply !== 1 ? 's' : ''}, ${c.reject} reject${c.reject !== 1 ? 's' : ''})`
               : 'Done (no changes)';
         }

         function refreshRows() {
           overlay.querySelector('#batchRows').innerHTML = buildRows();
           attachDecisionListeners();
           updateSummary();
         }

         function setAll(decision) {
           states.fill(decision);
           refreshRows();
         }

         overlay.innerHTML = `
           <div class="modal-content batch-modal">
             <div class="modal-header">
               <div class="modal-title">Review Touchup Results — ${results.length} image${results.length !== 1 ? 's' : ''}</div>
               <button class="modal-close">&times;</button>
             </div>
             <div class="batch-intro">
               Choose an outcome per image. This separates "rejecting a touchup" from "rejecting the image" so actions are explicit.
             </div>
              <div class="batch-toolbar">
                 <button class="btn-all-apply" id="batchAllApply">Use touchup for all (Shift+A)</button>
                 <button class="btn-all-keep" id="batchAllKeep">Keep original for all (Shift+O)</button>
                 <button class="btn-all-reject" id="batchAllReject">Reject all images (Shift+X)</button>
              </div>
              <div class="regenerate-controls">
                <select id="batchPromptSelect"></select>
                <input id="batchCustomPrompt" type="text" placeholder="Custom prompt text (used for Custom prompt option)" />
                <button id="batchRegenerateFocused" class="btn-regenerate-focused">Regenerate focused (Shift+G)</button>
                 <div class="regen-hint">Use this during before/after review when a touchup is subpar. Prompt dropdown loads from touchup prompts JSON plus custom input.</div>
              </div>
              <div class="batch-summary">
               <span class="summary-pill summary-apply" id="pillApply"></span>
               <span class="summary-pill summary-keep" id="pillKeep"></span>
               <span class="summary-pill summary-reject" id="pillReject"></span>
               ${failureCount > 0 ? `<span class="summary-pill summary-failed">Generation failed: ${failureCount}</span>` : ''}
             </div>
             <div class="batch-list" id="batchRows">${buildRows()}</div>
             <div class="batch-footer">
                  <div class="batch-footer-note">Shortcuts: Up/Down = move row, A = use touchup, O = keep original, X = reject image, Shift+G = regenerate focused, Shift+A/O/X = set all, Enter = apply, Esc = close</div>
               <div style="display:flex; gap:8px;">
                 <button class="btn-secondary" id="batchCancel">Close</button>
                 <button class="btn-accept" id="batchApply"></button>
               </div>
             </div>
           </div>
         `;

         document.body.appendChild(overlay);

         const modalPromptSelect = overlay.querySelector('#batchPromptSelect');
         const modalCustomPrompt = overlay.querySelector('#batchCustomPrompt');
         modalPromptSelect.innerHTML = touchupPromptSelect.innerHTML;
         if ([...modalPromptSelect.options].some((opt) => opt.value === touchupPromptSelect.value)) {
           modalPromptSelect.value = touchupPromptSelect.value;
         }
         modalCustomPrompt.value = customPrompt.value;

         function getModalPromptConfig() {
           return getSelectedTouchupConfig(modalPromptSelect, modalCustomPrompt);
         }

          modalPromptSelect.addEventListener('change', () => {
            const value = modalPromptSelect.value || '';
            if (value.startsWith('prompt:')) {
              const promptId = value.slice('prompt:'.length);
              const promptText = touchupPromptMap.get(promptId) || '';
              modalCustomPrompt.value = promptText;
            }
          });

         function focusRow(nextIdx) {
           focusedIdx = Math.max(0, Math.min(results.length - 1, nextIdx));
           refreshRows();
           const row = overlay.querySelector(`[data-row-index="${focusedIdx}"]`);
           if (row) row.focus({ preventScroll: true });
         }

         function cleanup() {
           modalClosed = true;
           overlay.remove();
           document.removeEventListener('keydown', handleKeydown);
         }

         function attachDecisionListeners() {
           overlay.querySelectorAll('[data-decision]').forEach((btn) => {
             btn.addEventListener('click', () => {
               const idx = Number(btn.getAttribute('data-idx'));
               const decision = btn.getAttribute('data-decision');
               focusedIdx = idx;
               states[idx] = decision;
               refreshRows();
             });
           });
            overlay.querySelectorAll('[data-row-index]').forEach((row) => {
              row.addEventListener('click', () => {
                focusedIdx = Number(row.getAttribute('data-row-index'));
                refreshRows();
              });
            });
           overlay.querySelectorAll('[data-row-regenerate]').forEach((btn) => {
             btn.addEventListener('click', async () => {
               const idx = Number(btn.getAttribute('data-row-regenerate'));
               await regenerateAtIndex(idx);
             });
           });
         }

         async function regenerateAtIndex(idx) {
           if (idx < 0 || idx >= results.length || regenerating[idx]) return;

            let promptConfig;
            try {
              promptConfig = getModalPromptConfig();
            } catch (err) {
              alert(err.message || String(err));
              return;
            }
            const selectedProvider = getSelectedTouchupProvider();

           focusedIdx = idx;
           regenerating[idx] = true;
           if (!modalClosed) refreshRows();

           try {
              const payload = {
                image_relative_path: results[idx].item.relative_path,
                prompt_mode: promptConfig.promptMode,
                provider: selectedProvider,
              };
              if (promptConfig.promptMode === 'stored') {
                payload.prompt_id = promptConfig.promptId;
              } else if (promptConfig.promptMode === 'custom') {
                payload.prompt_mode = 'custom';
                payload.custom_prompt = promptConfig.customPromptText;
              }

              const res = await fetch('/api/synth/touchup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
              const body = await res.json().catch(() => ({}));
              if (!res.ok) {
                throw new Error(body.detail || 'Regeneration failed');
              }
              console.log('Touchup prompt:', body.prompt_used);

              results[idx].touchupPath = body.image;
             results[idx].isTemp = body.is_temp || false;
             states[idx] = 'apply_touchup';
           } catch (err) {
             if (!modalClosed) {
               alert(`Regeneration failed for ${results[idx].item.image_id}: ${err.message || err}`);
             }
           } finally {
             regenerating[idx] = false;
              if (!modalClosed) {
                refreshRows();
                const row = overlay.querySelector(`[data-row-index="${idx}"]`);
                if (row) row.scrollIntoView({ block: 'nearest' });
              }
              refreshCostSummary();
            }
          }

         async function applyDecisions() {
           if (regenerating.some(Boolean)) {
             alert('Please wait for regeneration to finish before applying decisions.');
             return;
           }

           const c = getCounts();
           if (!c.apply && !c.reject) {
             cleanup();
             resolve();
             return;
           }

           const applyBtn = overlay.querySelector('#batchApply');
           applyBtn.disabled = true;
           applyBtn.textContent = 'Applying...';

           const applyTargets = results.filter((_, i) => states[i] === 'apply_touchup');
           const rejectTargets = results.filter((_, i) => states[i] === 'reject_image');

           const applyTasks = applyTargets.map((resultItem) => async () => {
             await applyTouchupToOriginal(resultItem);
             return resultItem.item.image_id;
           });

           const applyOutcomes = await runWithPool(applyTasks, 30);
           const appliedIds = applyOutcomes.filter((o) => o.ok).map((o) => o.value);
           const applyErrors = applyOutcomes.filter((o) => !o.ok);

           try {
             if (appliedIds.length) {
               await updateReviewStatus(appliedIds, 'edited');
             }
             if (rejectTargets.length) {
               await updateReviewStatus(rejectTargets.map((r) => r.item.image_id), 'rejected');
             }
           } catch (err) {
             alert(`Status update failed: ${err.message}`);
             applyBtn.disabled = false;
             updateSummary();
             return;
           }

           if (applyErrors.length) {
             const msgs = applyErrors.map((err) => err.error?.message || 'Unknown error');
             alert(`Applied ${appliedIds.length}/${applyTargets.length} touchup(s).\n\nErrors:\n${msgs.slice(0, 5).join('\n')}`);
           }

           cleanup();
           resolve();
         }

          function handleKeydown(e) {
            const key = e.key.toLowerCase();
            const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
            const isTypingTarget = tag === 'input' || tag === 'textarea' || e.target?.isContentEditable;
            if (key === 'escape') {
              cleanup();
              resolve();
            } else if (key === 'enter') {
              e.preventDefault();
              applyDecisions();
            } else if (isTypingTarget) {
              return;
            } else if (key === 'arrowdown') {
              e.preventDefault();
              focusRow(focusedIdx + 1);
            } else if (key === 'arrowup') {
              e.preventDefault();
              focusRow(focusedIdx - 1);
            } else if (e.shiftKey && key === 'a') {
              setAll('apply_touchup');
            } else if (e.shiftKey && key === 'o') {
              setAll('keep_original');
           } else if (e.shiftKey && key === 'x') {
             setAll('reject_image');
            } else if (e.shiftKey && key === 'g') {
              e.preventDefault();
              regenerateAtIndex(focusedIdx);
            } else if (key === 'a') {
              states[focusedIdx] = 'apply_touchup';
              refreshRows();
            } else if (key === 'o') {
              states[focusedIdx] = 'keep_original';
              refreshRows();
            } else if (key === 'x') {
              states[focusedIdx] = 'reject_image';
              refreshRows();
            }
          }

         overlay.querySelector('.modal-close').addEventListener('click', () => {
           cleanup();
           resolve();
         });
         overlay.querySelector('#batchCancel').addEventListener('click', () => {
           cleanup();
           resolve();
         });
         overlay.querySelector('#batchAllApply').addEventListener('click', () => setAll('apply_touchup'));
         overlay.querySelector('#batchAllKeep').addEventListener('click', () => setAll('keep_original'));
         overlay.querySelector('#batchAllReject').addEventListener('click', () => setAll('reject_image'));
         overlay.querySelector('#batchRegenerateFocused').addEventListener('click', () => regenerateAtIndex(focusedIdx));
         overlay.querySelector('#batchApply').addEventListener('click', applyDecisions);
         document.addEventListener('keydown', handleKeydown);

         attachDecisionListeners();
         updateSummary();
         focusRow(0);
       });
     }
