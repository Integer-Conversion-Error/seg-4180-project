<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street View Parameter Tester</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface-hover: #252525;
            --border: #333;
            --text: #e5e5e5;
            --text-dim: #888;
            --accent: #ff6b35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
        }

        h1 span {
            color: var(--accent);
        }

        .container {
            display: flex;
            height: calc(100vh - 65px);
        }

        .controls {
            width: 360px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
        }

        .control-group {
            margin-bottom: 24px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .control-group input[type="text"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            padding: 12px;
        }

        .control-group input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .slider-group {
            margin-bottom: 20px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-header label {
            font-size: 14px;
            font-weight: 500;
        }

        .slider-header .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 4px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #ff8555;
            transform: translateY(-1px);
        }

        .btn.secondary {
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn.secondary:hover {
            background: var(--border);
        }

        .preview {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #000;
        }

        .preview img {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            object-fit: cover;
        }

        .url-output {
            margin-top: 16px;
            width: 100%;
            max-width: 800px;
        }

        .url-output label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .url-output textarea {
            width: 100%;
            height: 60px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 10px;
            resize: none;
        }

        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .preset-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .preset-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        .hint {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Street View <span>Parameter Tester</span></h1>
    </header>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Location</label>
                <input type="text" id="location" value="40.7128,-74.0060" placeholder="lat,lng or address">
                <p class="hint">Enter coordinates or address</p>
            </div>

            <div class="control-group">
                <label>Quick Presets</label>
                <div class="presets">
                    <button class="preset-btn" onclick="setPreset('nyc')">NYC Downtown</button>
                    <button class="preset-btn" onclick="setPreset('sf')">San Francisco</button>
                    <button class="preset-btn" onclick="setPreset('la')">LA Sunset</button>
                    <button class="preset-btn" onclick="setPreset('chicago')">Chicago</button>
                </div>
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label>Heading</label>
                    <span class="value" id="heading-value">180°</span>
                </div>
                <input type="range" id="heading" min="0" max="360" value="180">
                <p class="hint">Camera direction (0=North, 90=East, 180=South, 270=West)</p>
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label>Pitch</label>
                    <span class="value" id="pitch-value">0°</span>
                </div>
                <input type="range" id="pitch" min="-90" max="90" value="0">
                <p class="hint">Up/down angle (-90=up, 0=horizon, 90=down)</p>
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label>FOV</label>
                    <span class="value" id="fov-value">80°</span>
                </div>
                <input type="range" id="fov" min="10" max="120" value="80">
                <p class="hint">Field of view (10=narrow, 120=wide)</p>
            </div>

            <div class="slider-group">
                <div class="slider-header">
                    <label>Radius</label>
                    <span class="value" id="radius-value">50m</span>
                </div>
                <input type="range" id="radius" min="10" max="500" value="50">
                <p class="hint">Search radius for Street View</p>
            </div>

            <button class="btn" onclick="updatePreview()">Update Preview</button>
            <button class="btn secondary" onclick="copyParams()">Copy Parameters</button>
        </div>

        <div class="preview">
            <img id="streetview-image" alt="Street View Preview">
            <div class="url-output">
                <label>API URL</label>
                <textarea id="api-url" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        const GSV_API_KEY = 'AIzaSyDtL6_O4JqV2j3FRaOxYRIibjoJPSP-VKs';
        
        const presets = {
            nyc: { location: '40.7128,-74.0060', heading: 180, pitch: 0, fov: 80, radius: 50 },
            sf: { location: '37.7749,-122.4194', heading: 270, pitch: 0, fov: 90, radius: 50 },
            la: { location: '34.0522,-118.2437', heading: 180, pitch: -10, fov: 100, radius: 50 },
            chicago: { location: '41.8781,-87.6298', heading: 90, pitch: 0, fov: 80, radius: 50 }
        };

        const inputs = {
            location: document.getElementById('location'),
            heading: document.getElementById('heading'),
            pitch: document.getElementById('pitch'),
            fov: document.getElementById('fov'),
            radius: document.getElementById('radius')
        };

        const values = {
            heading: document.getElementById('heading-value'),
            pitch: document.getElementById('pitch-value'),
            fov: document.getElementById('fov-value'),
            radius: document.getElementById('radius-value')
        };

        function updateValueDisplay() {
            values.heading.textContent = inputs.heading.value + '°';
            values.pitch.textContent = inputs.pitch.value + '°';
            values.fov.textContent = inputs.fov.value + '°';
            values.radius.textContent = inputs.radius.value + 'm';
        }

        function getStreetViewUrl() {
            const params = new URLSearchParams({
                location: inputs.location.value,
                heading: inputs.heading.value,
                pitch: inputs.pitch.value,
                fov: inputs.fov.value,
                radius: inputs.radius.value,
                key: GSV_API_KEY,
                size: '1280x720'
            });
            return `https://www.googleapis.com/streetview/v1/streetview?${params}`;
        }

        function getStaticUrl() {
            const params = new URLSearchParams({
                location: inputs.location.value,
                heading: inputs.heading.value,
                pitch: inputs.pitch.value,
                fov: inputs.fov.value,
                radius: inputs.radius.value,
                key: GSV_API_KEY,
                size: '1280x720'
            });
            return `https://maps.googleapis.com/maps/api/streetview?${params}`;
        }

        function updatePreview() {
            const url = getStaticUrl();
            document.getElementById('streetview-image').src = url;
            document.getElementById('api-url').value = url;
        }

        function setPreset(name) {
            const p = presets[name];
            inputs.location.value = p.location;
            inputs.heading.value = p.heading;
            inputs.pitch.value = p.pitch;
            inputs.fov.value = p.fov;
            inputs.radius.value = p.radius;
            updateValueDisplay();
            updatePreview();
        }

        function copyParams() {
            const params = {
                street: 'test_point',
                label: 'test_point',
                location: inputs.location.value,
                heading: inputs.heading.value,
                pitch: inputs.pitch.value,
                fov: inputs.fov.value,
                radius: inputs.radius.value
            };
            
            const csv = Object.keys(params).join(',') + '\n' + Object.values(params).join(',');
            navigator.clipboard.writeText(csv).then(() => {
                alert('Parameters copied to clipboard as CSV!');
            });
        }

        // Event listeners
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', updateValueDisplay);
        });

        // Initialize
        updatePreview();
    </script>
</body>
</html>
