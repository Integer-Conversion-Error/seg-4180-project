        function segmentPolygonIntoBoxes(polygon, boxSizeM) {
            if (!Array.isArray(polygon) || polygon.length < 3) return [];

            const latValues = polygon.map((point) => point[0]);
            const lngValues = polygon.map((point) => point[1]);
            const minLat = Math.min(...latValues);
            const maxLat = Math.max(...latValues);
            const minLng = Math.min(...lngValues);
            const maxLng = Math.max(...lngValues);

            const meanLat = (minLat + maxLat) / 2;
            const metersPerDegLat = 111320;
            const metersPerDegLng = Math.max(1, metersPerDegLat * Math.cos((meanLat * Math.PI) / 180));
            const latStep = boxSizeM / metersPerDegLat;
            const lngStep = boxSizeM / metersPerDegLng;

            if (!Number.isFinite(latStep) || !Number.isFinite(lngStep) || latStep <= 0 || lngStep <= 0) {
                return [];
            }

            const segments = [];

            for (let lat = minLat; lat < maxLat; lat += latStep) {
                const nextLat = Math.min(lat + latStep, maxLat);
                const rowBoxes = [];

                for (let lng = minLng; lng < maxLng; lng += lngStep) {
                    const nextLng = Math.min(lng + lngStep, maxLng);
                    const centerLat = (lat + nextLat) / 2;
                    const centerLng = (lng + nextLng) / 2;

                    if (!pointInPolygon(centerLat, centerLng, polygon)) continue;

                    rowBoxes.push({
                        minLat: lat,
                        minLng: lng,
                        maxLat: nextLat,
                        maxLng: nextLng
                    });
                }

                if (!rowBoxes.length) continue;

                rowBoxes.sort((a, b) => a.minLng - b.minLng);
                let merged = { ...rowBoxes[0] };
                for (let i = 1; i < rowBoxes.length; i++) {
                    const current = rowBoxes[i];
                    if (current.minLng <= merged.maxLng + 1e-12) {
                        merged.maxLng = Math.max(merged.maxLng, current.maxLng);
                    } else {
                        segments.push(merged);
                        merged = { ...current };
                    }
                }
                segments.push(merged);
            }

            return segments;
        }

        function renderSamplerSegmentation(boxes) {
            if (!map) return;
            if (samplerSegmentationLayer) {
                map.removeLayer(samplerSegmentationLayer);
                samplerSegmentationLayer = null;
            }
            if (!boxes.length) return;

            const layers = boxes.map((box) => L.rectangle([
                [box.minLat, box.minLng],
                [box.maxLat, box.maxLng]
            ], {
                color: '#4ade80',
                weight: 1,
                fillOpacity: 0.06,
                interactive: false
            }));
            samplerSegmentationLayer = L.layerGroup(layers).addTo(map);
        }

        function buildPolygonSegmentsFromUI() {
            try {
                const polygonText = document.getElementById('sampler-polygon').value;
                const parsed = JSON.parse(polygonText || '{}');
                const polygon = extractPolygonPoints(parsed);
                const boxSizeM = Math.max(5, toFiniteNumber(document.getElementById('sampler-segment-size').value, 80));
                const boxes = segmentPolygonIntoBoxes(polygon, boxSizeM);

                samplerSegmentBoxes = boxes;
                renderSamplerSegmentation(boxes);
                updateSamplerSegmentCount();
                document.getElementById('sampler-segment-enabled').checked = true;
                updateSamplerStatus(`Built ${boxes.length} segment boxes from irregular shape.`);
            } catch (error) {
                clearSamplerSegmentation();
                updateSamplerStatus(`Segmentation failed: ${error && error.message ? error.message : String(error)}`);
            }
        }

        function samplePointFromSegmentBoxes(randomFn, boxes) {
            if (!boxes.length) return null;

            let totalArea = 0;
            boxes.forEach((box) => {
                totalArea += (box.maxLat - box.minLat) * (box.maxLng - box.minLng);
            });
            if (!Number.isFinite(totalArea) || totalArea <= 0) return null;

            let pick = randomFn() * totalArea;
            for (let i = 0; i < boxes.length; i++) {
                const box = boxes[i];
                const area = (box.maxLat - box.minLat) * (box.maxLng - box.minLng);
                if (pick <= area || i === boxes.length - 1) {
                    return {
                        lat: box.minLat + randomFn() * (box.maxLat - box.minLat),
                        lng: box.minLng + randomFn() * (box.maxLng - box.minLng)
                    };
                }
                pick -= area;
            }

            return null;
        }

        function handleSamplerMapClick(latlng) {
            if (!samplerDrawMode || !map) return false;

            if (samplerDrawMode === 'bbox') {
                if (!samplerDrawFirstCorner) {
                    samplerDrawFirstCorner = latlng;
                    clearSamplerDraftLayers();
                    samplerDrawFirstCorner = latlng;
                    samplerDraftLayer = L.circleMarker(latlng, {
                        radius: 5,
                        color: '#ff6b35',
                        fillColor: '#ff6b35',
                        fillOpacity: 0.8,
                        weight: 1
                    }).addTo(map);
                    updateSamplerStatus('Select opposite corner to complete bbox.');
                } else {
                    const bounds = L.latLngBounds(samplerDrawFirstCorner, latlng);
                    setBBoxInputFromBounds(bounds);
                    setSamplerAreaLayer(L.rectangle(bounds, {
                        color: '#ff6b35',
                        weight: 2,
                        fillOpacity: 0.08
                    }));
                    samplerDrawMode = null;
                    clearSamplerDraftLayers();
                    updateSamplerStatus('BBox captured from map.');
                }
                return true;
            }

            if (samplerDrawMode === 'polygon') {
                samplerDraftLatLngs.push(latlng);
                const vertex = L.circleMarker(latlng, {
                    radius: 4,
                    color: '#ff6b35',
                    fillColor: '#ff6b35',
                    fillOpacity: 0.8,
                    weight: 1
                }).addTo(map);
                samplerDraftVertices.push(vertex);

                if (samplerDraftLayer) {
                    map.removeLayer(samplerDraftLayer);
                }
                if (samplerDraftLatLngs.length >= 2) {
                    samplerDraftLayer = L.polyline(samplerDraftLatLngs, {
                        color: '#ff6b35',
                        weight: 2,
                        dashArray: '4,4'
                    }).addTo(map);
                }

                updateSamplerStatus(`Polygon vertices: ${samplerDraftLatLngs.length}. Click Finish when done.`);
                return true;
            }

            return false;
        }

        function samplePointInArea(randomFn, bounds, polygon) {
            if (!polygon) {
                return {
                    lat: bounds.minLat + randomFn() * (bounds.maxLat - bounds.minLat),
                    lng: bounds.minLng + randomFn() * (bounds.maxLng - bounds.minLng)
                };
            }

            for (let i = 0; i < 250; i++) {
                const lat = bounds.minLat + randomFn() * (bounds.maxLat - bounds.minLat);
                const lng = bounds.minLng + randomFn() * (bounds.maxLng - bounds.minLng);
                if (pointInPolygon(lat, lng, polygon)) {
                    return { lat, lng };
                }
            }

            return null;
        }

        async function appendByAreaSampling() {
            if (isSampling) return;

            const runButton = document.getElementById('sampler-run-btn');
            const mode = document.getElementById('sampler-area-mode').value;
            const bboxText = document.getElementById('sampler-bbox').value;
            const polygonText = document.getElementById('sampler-polygon').value;
            let dryRunCandidates = [];
            let directionCount = 8;

            try {
                isSampling = true;
                runButton.disabled = true;
                runButton.textContent = 'Sampling...';
                clearDryRunPreview();

                const targetPanos = Math.max(0, toFiniteInt(document.getElementById('sampler-target').value, 200));
                const radius = Math.max(1, toFiniteInt(document.getElementById('sampler-radius').value, 50));
                const minSpacingRaw = toFiniteNumber(document.getElementById('sampler-spacing').value, 0);
                const minSpacingM = minSpacingRaw > 0 ? minSpacingRaw : null;
                const seed = toFiniteInt(document.getElementById('sampler-seed').value, 123);
                const maxAttempts = Math.max(1, toFiniteInt(document.getElementById('sampler-attempts').value, 10000));
                const directionSpecs = getTemplateDirectionSpecs();
                directionCount = directionSpecs.length;
                const labelPrefix = (document.getElementById('sampler-label-prefix').value || 'auto').trim() || 'auto';
                const dryRun = document.getElementById('sampler-dry-run').checked;
                const useSegments = mode === 'polygon' && document.getElementById('sampler-segment-enabled').checked;
                const segmentSizeM = Math.max(5, toFiniteNumber(document.getElementById('sampler-segment-size').value, 80));
                const apiKey = (document.getElementById('sampler-api-key').value || '').trim() || GSV_API_KEY;

                if (!apiKey) {
                    throw new Error('No API key available for metadata requests');
                }

                let polygon = null;
                let bounds = null;

                if (mode === 'bbox') {
                    bounds = parseBBoxInput(bboxText);
                    clearSamplerSegmentation();
                } else {
                    const parsed = JSON.parse(polygonText || '{}');
                    polygon = extractPolygonPoints(parsed);
                    const latValues = polygon.map((p) => p[0]);
                    const lngValues = polygon.map((p) => p[1]);
                    bounds = {
                        minLat: Math.min(...latValues),
                        minLng: Math.min(...lngValues),
                        maxLat: Math.max(...latValues),
                        maxLng: Math.max(...lngValues)
                    };

                    if (useSegments) {
                        samplerSegmentBoxes = segmentPolygonIntoBoxes(polygon, segmentSizeM);
                        if (!samplerSegmentBoxes.length) {
                            throw new Error('Could not build segment boxes from polygon. Try a larger shape or smaller box size.');
                        }
                        renderSamplerSegmentation(samplerSegmentBoxes);
                        updateSamplerSegmentCount();
                    } else {
                        clearSamplerSegmentation();
                    }
                }

                ensureCsvColumns(BASE_COLUMNS);
                ensureCsvColumns(ENRICHMENT_COLUMNS);

                const bottomCropInput = (document.getElementById('sampler-bottom-crop').value || '').trim();
                const bottomCropValue = bottomCropInput && Number.isFinite(Number.parseFloat(bottomCropInput))
                    ? bottomCropInput
                    : String(template.bottomCrop);

                const existingPanoIds = new Set(
                    points
                        .map((point) => (point && point.rowData ? String(getObjectValueByKey(point.rowData, 'pano_id') || '').trim() : ''))
                        .filter(Boolean)
                );

                const spacingRefs = [];
                if (minSpacingM !== null) {
                    const seenPanos = new Set();
                    points.forEach((point) => {
                        if (!point || !point.rowData) return;
                        const panoId = String(getObjectValueByKey(point.rowData, 'pano_id') || '').trim();
                        if (!panoId || seenPanos.has(panoId)) return;
                        const panoLat = Number.parseFloat(getObjectValueByKey(point.rowData, 'pano_lat'));
                        const panoLng = Number.parseFloat(getObjectValueByKey(point.rowData, 'pano_lng'));
                        if (!Number.isFinite(panoLat) || !Number.isFinite(panoLng)) return;
                        spacingRefs.push([panoLat, panoLng]);
                        seenPanos.add(panoId);
                    });
                }

                const randomFn = createSeededRandom(seed);
                const allocateStreet = buildStreetAllocator();
                const acceptedThisRun = new Set();

                const stats = {
                    attempted: 0,
                    acceptedPanos: 0,
                    duplicates: 0,
                    noImagery: 0,
                    outOfArea: 0,
                    tooClose: 0,
                    failed: 0
                };

                updateSamplerStatus(['Sampling started...']);

                while (stats.acceptedPanos < targetPanos && stats.attempted < maxAttempts) {
                    stats.attempted += 1;
                    const sampled = useSegments
                        ? samplePointFromSegmentBoxes(randomFn, samplerSegmentBoxes)
                        : samplePointInArea(randomFn, bounds, polygon);
                    if (!sampled) {
                        stats.failed += 1;
                        continue;
                    }

                    const sampleLocation = formatLocation(sampled.lat, sampled.lng);
                    const metadata = await metadataCallWithRetry(sampleLocation, radius, apiKey);

                    if (metadata.status === 'failed') {
                        stats.failed += 1;
                        continue;
                    }

                    if (metadata.status !== 'ok') {
                        stats.noImagery += 1;
                        continue;
                    }

                    const panoId = String(metadata.pano_id || '').trim();
                    const panoLat = Number.parseFloat(metadata.pano_lat);
                    const panoLng = Number.parseFloat(metadata.pano_lng);

                    if (!panoId || !Number.isFinite(panoLat) || !Number.isFinite(panoLng)) {
                        stats.failed += 1;
                        continue;
                    }

                    if (existingPanoIds.has(panoId) || acceptedThisRun.has(panoId)) {
                        stats.duplicates += 1;
                        continue;
                    }

                    const isInsideArea = polygon
                        ? pointInPolygon(panoLat, panoLng, polygon)
                        : (panoLat >= bounds.minLat && panoLat <= bounds.maxLat && panoLng >= bounds.minLng && panoLng <= bounds.maxLng);

                    if (!isInsideArea) {
                        stats.outOfArea += 1;
                        continue;
                    }

                    if (minSpacingM !== null) {
                        let tooClose = false;
                        for (let i = 0; i < spacingRefs.length; i++) {
                            const ref = spacingRefs[i];
                            if (haversineM(panoLat, panoLng, ref[0], ref[1]) < minSpacingM) {
                                tooClose = true;
                                break;
                            }
                        }
                        if (tooClose) {
                            stats.tooClose += 1;
                            continue;
                        }
                    }

                    acceptedThisRun.add(panoId);
                    existingPanoIds.add(panoId);
                    if (minSpacingM !== null) {
                        spacingRefs.push([panoLat, panoLng]);
                    }

                    if (dryRun) {
                        dryRunCandidates.push({ panoId, lat: panoLat, lng: panoLng });
                    }

                    stats.acceptedPanos += 1;

                    const createdAt = new Date().toISOString();
                    const safePano = panoId.replace(/[^A-Za-z0-9_-]/g, '_');
                    const snappedLocation = formatLocation(panoLat, panoLng);

                    directionSpecs.forEach((directionSpec) => {
                        const headingValue = directionSpec.heading;
                        const row = {
                            street: allocateStreet(),
                            label: `${labelPrefix}_${safePano}_h${headingValue}`,
                            location: snappedLocation,
                            heading: String(headingValue),
                            pitch: String(directionSpec.pitch),
                            fov: String(directionSpec.fov),
                            radius: String(radius),
                            bottom_crop: bottomCropValue,
                            source: 'auto_sampler',
                            sample_location: sampleLocation,
                            pano_id: panoId,
                            pano_lat: String(panoLat),
                            pano_lng: String(panoLng),
                            pano_date: String(metadata.pano_date || ''),
                            status: 'ok',
                            group_id: panoId,
                            created_at: createdAt
                        };

                        if (!dryRun) {
                            addPoint(panoLat, panoLng, headingValue, directionSpec.pitch, directionSpec.fov, radius, row, true);
                        }
                    });

                    if (stats.attempted % 10 === 0 || stats.acceptedPanos === targetPanos) {
                        updateSamplerStatus([
                            `attempted=${stats.attempted}`,
                            `accepted_panos=${stats.acceptedPanos}`,
                            `duplicates=${stats.duplicates}`,
                            `no_imagery=${stats.noImagery}`,
                            `out_of_area=${stats.outOfArea}`,
                            `too_close=${stats.tooClose}`,
                            `failed=${stats.failed}`,
                            `dry_run=${dryRun}`,
                            `segments=${useSegments ? samplerSegmentBoxes.length : 0}`,
                            `new_rows=${stats.acceptedPanos * directionSpecs.length}`
                        ]);
                    }
                }

                if (!dryRun) {
                    updateUI();
                }

                if (dryRun) {
                    renderDryRunPreview(dryRunCandidates, directionCount);
                } else {
                    clearDryRunPreview();
                }

                if (!dryRun && points.length > 0) {
                    const boundsObj = L.latLngBounds(points.map((point) => [point.lat, point.lng]));
                    map.fitBounds(boundsObj, { padding: [50, 50] });
                }

                updateSamplerStatus([
                    `attempted=${stats.attempted}`,
                    `accepted_panos=${stats.acceptedPanos}`,
                    `duplicates=${stats.duplicates}`,
                    `no_imagery=${stats.noImagery}`,
                    `out_of_area=${stats.outOfArea}`,
                    `too_close=${stats.tooClose}`,
                    `failed=${stats.failed}`,
                    `dry_run=${dryRun}`,
                    `segments=${useSegments ? samplerSegmentBoxes.length : 0}`,
                    `new_rows=${stats.acceptedPanos * directionSpecs.length}`
                ]);
            } catch (error) {
                updateSamplerStatus(`Sampling failed: ${error && error.message ? error.message : String(error)}`);
            } finally {
                isSampling = false;
                runButton.disabled = false;
                runButton.textContent = 'Append New Panos';
            }
        }
        
        // API Counter functions
        function initApiCounter() {
            const today = new Date().toISOString().split('T')[0];
            let stored = {};
            try {
                stored = JSON.parse(localStorage.getItem('gsv_api_counter')) || {};
            } catch (e) {
                stored = {};
            }
            
            // Reset today if it's a new day
            if (stored.date !== today) {
                stored.today = 0;
                stored.date = today;
            }
            
            // Initialize session counter
            window.apiCounterSession = 0;
            
            // Load cumulative and today (handle case where values are 0)
            window.apiCounterCumulative = (stored.cumulative !== undefined) ? stored.cumulative : 0;
            window.apiCounterToday = (stored.today !== undefined) ? stored.today : 0;
            
            updateApiCounterDisplay();
        }
        
        function trackApiCall() {
            const today = new Date().toISOString().split('T')[0];
            const stored = JSON.parse(localStorage.getItem('gsv_api_counter') || '{}');
            
            // Reset today if it's a new day
            if (stored.date !== today) {
                stored.today = 0;
                stored.date = today;
            }
            
            window.apiCounterSession++;
            window.apiCounterToday++;
            window.apiCounterCumulative++;
            
            stored.today = window.apiCounterToday;
            stored.cumulative = window.apiCounterCumulative;
            stored.date = today;
            
            localStorage.setItem('gsv_api_counter', JSON.stringify(stored));
            updateApiCounterDisplay();
        }
        
        function updateApiCounterDisplay() {
            document.getElementById('counter-session').textContent = window.apiCounterSession;
            document.getElementById('counter-today').textContent = window.apiCounterToday;
            document.getElementById('counter-cumulative').textContent = window.apiCounterCumulative;
        }
        
        function initMap() {
            map = L.map('map', { 
                zoomControl: true,
                attributionControl: false 
            }).setView([45.4206, -75.6786], 14);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);
            
            // Box selection with Ctrl
            let boxStart = null;
            const selectionBox = document.createElement('div');
            selectionBox.className = 'selection-box';
            selectionBox.style.cssText = 'position:absolute;border:2px solid var(--accent);background:var(--accent-dim);pointer-events:none;z-index:1000;display:none';
            document.getElementById('map').appendChild(selectionBox);
            
            map.on('mousedown', (e) => {
                if (e.originalEvent.ctrlKey || e.originalEvent.metaKey) {
                    boxStart = e.containerPoint;
                    selectionBox.style.left = e.containerPoint.x + 'px';
                    selectionBox.style.top = e.containerPoint.y + 'px';
                    selectionBox.style.width = '0';
                    selectionBox.style.height = '0';
                    selectionBox.style.display = 'block';
                }
            });
            
            map.on('mousemove', (e) => {
                if (boxStart) {
                    const x = Math.min(boxStart.x, e.containerPoint.x);
                    const y = Math.min(boxStart.y, e.containerPoint.y);
                    const w = Math.abs(e.containerPoint.x - boxStart.x);
                    const h = Math.abs(e.containerPoint.y - boxStart.y);
                    selectionBox.style.left = x + 'px';
                    selectionBox.style.top = y + 'px';
                    selectionBox.style.width = w + 'px';
                    selectionBox.style.height = h + 'px';
                }
            });
            
            map.on('mouseup', (e) => {
                if (boxStart) {
                    boxStart = null;
                    selectionBox.style.display = 'none';
                    
                    const bounds = map.getBounds();
                    points.forEach(p => {
                        if (bounds.contains([p.lat, p.lng])) {
                            selectedIds.add(p.id);
                        }
                    });
                    updateUI();
                }
            });
            
            // Click to add point
            map.on('click', (e) => {
                if (e.originalEvent.ctrlKey || e.originalEvent.metaKey) return;
                if (handleSamplerMapClick(e.latlng)) return;
                const { lat, lng } = e.latlng;
                addPoint(lat, lng);
            });
        }

        function renderTemplateRows() {
            const container = document.getElementById('template-rows');
            container.innerHTML = '';
            
            template.directions.forEach((t, i) => {
                const heading = (template.baseHeading + i * 45) % 360;
                const row = document.createElement('div');
                row.className = 'template-row';
                row.innerHTML = `
                    <label>${i + 1}</label>
                    <label class="heading" id="heading-label-${i}">${heading}°</label>
                    <div class="slider-cell">
                        <span class="slider-inline-label" id="pitch-val-${i}">Pitch: ${t.pitch}°</span>
                        <input type="range" value="${t.pitch}" min="-90" max="90"
                               oninput="updateTemplate(${i}, 'pitch', this.value)">
                    </div>
                    <div class="slider-cell">
                        <span class="slider-inline-label" id="fov-val-${i}">FOV: ${t.fov}</span>
                        <input type="range" value="${t.fov}" min="30" max="120"
                               oninput="updateTemplate(${i}, 'fov', this.value)">
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function updateBottomCrop(value) {
            const parsedValue = Number.parseInt(value, 10);
            template.bottomCrop = Number.isNaN(parsedValue) ? 0 : clampBottomCrop(parsedValue);

            const cropInput = document.getElementById('bottom-crop');
            const cropValue = document.getElementById('bottom-crop-val');
            if (cropInput) cropInput.value = `${template.bottomCrop}`;
            if (cropValue) cropValue.textContent = `${template.bottomCrop}px`;

            saveTemplateSettings();
            applyPreviewCrop();
        }

        function updateTemplate(idx, field, value) {
            template.directions[idx][field] = parseInt(value, 10);
        




            // Update display immediately
            const display = document.getElementById(`${field}-val-${idx}`);
            if (display) {
                display.textContent = field === 'pitch' ? `Pitch: ${value}°` : `FOV: ${value}`;
            }
            
            // Update the heading label for this direction
            const headingLabel = document.getElementById(`heading-label-${idx}`);
            if (headingLabel) {
                const heading = (template.baseHeading + idx * 45) % 360;
                headingLabel.textContent = `${heading}°`;
            }

            updateSamplerTemplateSummary();

            saveTemplateSettings();
            
            // Debounce API call
            if (templateDebounce) clearTimeout(templateDebounce);
            
            templateDebounce = setTimeout(() => {
                if (previewPoint) updatePreview();
                templateDebounce = null;
            }, 300);
        }

        function updatePreview() {
            const img = document.getElementById('preview-img');
            const info = document.getElementById('preview-info');
            const dirLabel = document.getElementById('preview-dir');
            
            if (!previewPoint) {
                img.src = '';
                info.textContent = 'Select one point';
                dirLabel.textContent = '- / 8';
                return;
            }
            
            dirLabel.textContent = `${previewDir + 1} / 8`;
            
            // Highlight active heading
            for (let i = 0; i < 8; i++) {
                const label = document.getElementById(`heading-label-${i}`);
                if (label) {
                    label.classList.toggle('active', i === previewDir);
                }
            }
            
            loadStreetViewImage(previewPoint, sliderHeading, previewDir);
        }

        function updateHeading(val) {
            sliderHeading = Number.parseInt(val, 10);
            document.getElementById('heading-value').textContent = `${val}°`;
            
            // Update display immediately, but debounce API call
            pendingHeading = sliderHeading;
            
            if (headingDebounce) clearTimeout(headingDebounce);
            
            headingDebounce = setTimeout(() => {
                if (previewPoint && pendingHeading !== null) {
                    // Update base heading and previewPoint heading
                    template.baseHeading = pendingHeading;
                    previewPoint.heading = pendingHeading;
                    for (let i = 0; i < 8; i++) {
                        const label = document.getElementById(`heading-label-${i}`);
                        if (label) {
                            label.textContent = (template.baseHeading + i * 45) % 360 + '°';
                        }
                    }
                    updateSamplerTemplateSummary();
                    saveTemplateSettings();
                    loadStreetViewImage(previewPoint, pendingHeading, previewDir);
                }
                headingDebounce = null;
            }, 300);
        }
        
        function loadStreetViewImage(point, heading, dir) {
            const img = document.getElementById('preview-img');
            const info = document.getElementById('preview-info');
            const t = template.directions[dir];
            
            const params = new URLSearchParams({
                location: `${point.lat},${point.lng}`,
                heading: heading,
                pitch: t.pitch,
                fov: t.fov,
                size: '640x640',
                key: GSV_API_KEY
            });
            
            img.src = `https://maps.googleapis.com/maps/api/streetview?${params}`;
            trackApiCall();
            info.textContent = `H:${heading}° P:${t.pitch}° F:${t.fov}`;
            applyPreviewCrop();
        }

        function prevPreview() {
            if (!previewPoint) return;
            previewDir = (previewDir - 1 + 8) % 8;
            sliderHeading = (template.baseHeading + previewDir * 45) % 360;
            document.getElementById('heading-slider').value = sliderHeading;
            document.getElementById('heading-value').textContent = sliderHeading + '°';
            updatePreview();
        }

        function nextPreview() {
            if (!previewPoint) return;
            previewDir = (previewDir + 1) % 8;
            sliderHeading = (template.baseHeading + previewDir * 45) % 360;
            document.getElementById('heading-slider').value = sliderHeading;
            document.getElementById('heading-value').textContent = sliderHeading + '°';
            updatePreview();
        }

        function playPreview() {
            if (!previewPoint) {
                alert('Select one point first');
                return;
            }
            
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
                document.getElementById('play-btn').textContent = '▶';
                return;
            }
            
            document.getElementById('play-btn').textContent = '⏹';
            previewDir = 0;
            updatePreview();
            
            playInterval = setInterval(() => {
                previewDir = (previewDir + 1) % 8;
                updatePreview();
            }, 1500);
        }

        function addPoint(lat, lng, heading = 180, pitch = 0, fov = 80, radius = 50, sourceRow = {}, skipUpdate = false) {
            const normalizedLat = toFiniteNumber(lat, 0);
            const normalizedLng = toFiniteNumber(lng, 0);
            const normalizedHeading = normalizeHeading(heading);
            const normalizedPitch = Math.max(-90, Math.min(90, toFiniteInt(pitch, 0)));
            const normalizedFov = Math.max(30, Math.min(120, toFiniteInt(fov, 80)));
            const normalizedRadius = Math.max(1, toFiniteInt(radius, 50));

            const id = Date.now() + Math.random();
            const point = {
                id,
                lat: normalizedLat,
                lng: normalizedLng,
                heading: normalizedHeading,
                pitch: normalizedPitch,
                fov: normalizedFov,
                radius: normalizedRadius
            };
            point.rowData = buildPointRowData(point, sourceRow);
            points.push(point);

            const marker = L.marker([normalizedLat, normalizedLng], {
                icon: L.divIcon({
                    className: 'custom-marker',
                    html: '<div></div>',
                    iconSize: [24, 24],
                    iconAnchor: [12, 24]
                })
            });
            
            marker.on('click', () => toggleSelection(id));
            marker.addTo(map);
            markers[id] = marker;

            if (!skipUpdate) {
                updateUI();
            }
        }

        function toggleSelection(id) {
            selectedIds.clear();
            selectedIds.add(id);
            updateUI();
        }

        function deletePoint(event, id) {
            event.stopPropagation();
            // Remove from points array
            points = points.filter(p => p.id !== id);
            // Remove marker
            if (markers[id]) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
            // Remove from selection
            selectedIds.delete(id);
            updateUI();
        }

        function selectAll() {
            points.forEach((p) => {
                selectedIds.add(p.id);
            });
            updateUI();
        }

        function clearSelection() {
            selectedIds.clear();
            previewPoint = null;
            updateUI();
        }

        function updateUI() {
            document.getElementById('selection-count').textContent = selectedIds.size;
            
            // Auto-select first point if only one point exists and nothing selected
            if (points.length === 1 && selectedIds.size === 0) {
                selectedIds.add(points[0].id);
            }
            
            if (selectedIds.size === 1) {
                const selectedId = Array.from(selectedIds)[0];
                previewPoint = points.find(p => p.id === selectedId);
                previewDir = 0;
                template.baseHeading = previewPoint ? previewPoint.heading : 180;
                sliderHeading = template.baseHeading;
                document.getElementById('heading-slider').value = sliderHeading;
                document.getElementById('heading-value').textContent = sliderHeading + '°';
                renderTemplateRows();
                updateSamplerTemplateSummary();
            } else {
                previewPoint = null;
            }
            updatePreview();
            
            const list = document.getElementById('points-list');
            list.innerHTML = points.map(p => `
                <div class="point-item ${selectedIds.has(p.id) ? 'selected' : ''}" 
                     onclick="toggleSelection(${p.id})">
                    <div class="coords">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div>
                    <div class="meta">H:${p.heading}° P:${p.pitch}° FOV:${p.fov}</div>
                    <button type="button" class="delete-btn" onclick="deletePoint(event, ${p.id})">×</button>
                </div>
            `).join('');
            
            Object.keys(markers).forEach(id => {
                const el = markers[id].getElement();
                if (el) {
                    const div = el.querySelector('div');
                    if (div) {
                        div.classList.toggle('selected', selectedIds.has(parseFloat(id)));
                    }
                }
            });
        }

        function importCSV(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                parseCSV(e.target.result);
            };
            reader.readAsText(file);
            input.value = '';
        }

        function parseCSV(csvText) {
            const matrix = parseCSVMatrix(csvText);
            if (matrix.length < 2) return;

            const headers = matrix[0].map((header, index) => {
                const name = String(header || '').trim();
                return name || `column_${index + 1}`;
            });

            if (points.length === 0) {
                csvColumns = [];
            }
            ensureCsvColumns(headers);
            ensureCsvColumns(BASE_COLUMNS);

            const indexByLowerName = {};
            headers.forEach((header, index) => {
                const key = header.toLowerCase();
                if (!(key in indexByLowerName)) {
                    indexByLowerName[key] = index;
                }
            });

            const getCell = (cells, key) => {
                const index = indexByLowerName[key];
                if (index === undefined) return '';
                return cells[index] !== undefined ? String(cells[index]).trim() : '';
            };

            for (let rowIndex = 1; rowIndex < matrix.length; rowIndex++) {
                const cells = matrix[rowIndex];
                const rowData = {};
                headers.forEach((header, index) => {
                    rowData[header] = cells[index] !== undefined ? String(cells[index]).trim() : '';
                });

                let lat = Number.NaN;
                let lng = Number.NaN;

                const latCell = getCell(cells, 'lat');
                const lngCell = getCell(cells, 'lng');
                if (latCell && lngCell) {
                    lat = Number.parseFloat(latCell);
                    lng = Number.parseFloat(lngCell);
                } else {
                    const parsed = parseLocation(getCell(cells, 'location'));
                    if (parsed) {
                        lat = parsed.lat;
                        lng = parsed.lng;
                    }
                }

                if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
                    continue;
                }

                const heading = toFiniteInt(getCell(cells, 'heading'), 180);
                const pitch = toFiniteInt(getCell(cells, 'pitch'), 0);
                const fov = toFiniteInt(getCell(cells, 'fov'), 80);
                const radius = toFiniteInt(getCell(cells, 'radius'), 50);

                addPoint(lat, lng, heading, pitch, fov, radius, rowData, true);
            }

            updateUI();
            if (points.length > 0) {
                const bounds = L.latLngBounds(points.map((point) => [point.lat, point.lng]));
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        function applyTemplate() {
            if (selectedIds.size === 0) {
                alert('Select at least one point');
                return;
            }
            
            const selected = points.filter(p => selectedIds.has(p.id));
            const results = [];
            
            selected.forEach((p, pointIdx) => {
                template.directions.forEach((t, dirIdx) => {
                    const heading = (template.baseHeading + dirIdx * 45) % 360;
                    results.push({
                        street: `point_${Math.floor(p.id)}_${dirIdx + 1}`,
                        label: `p${pointIdx + 1}_d${dirIdx + 1}`,
                        location: `${p.lat},${p.lng}`,
                        heading: heading,
                        pitch: t.pitch,
                        fov: t.fov,
                        radius: p.radius
                    });
                });
            });

            const headers = ['street', 'label', 'location', 'heading', 'pitch', 'fov', 'radius', 'bottom_crop'];
            const rows = results.map((row) => ({ ...row, bottom_crop: String(template.bottomCrop) }));
            const csv = rowsToCSV(headers, rows);
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'streetview_points_8dir.csv';
            a.click();
            URL.revokeObjectURL(url);
            
            alert(`Generated ${results.length} rows (${selected.length} points × 8)`);
        }

        function downloadCSV() {
            if (points.length === 0) return;

            ensureCsvColumns(BASE_COLUMNS);
            const rows = points.map((point, index) => buildExportRow(point, index));
            const csv = rowsToCSV(csvColumns, rows);

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'points.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importFromParams() {
            const text = document.getElementById('import-params').value.trim();
            if (!text) return;
            
            let pitch = 0, fov = 80;
            
            if (text.includes('pitch=')) {
                const pitchMatch = text.match(/pitch=(-?\d+)/);
                const fovMatch = text.match(/fov=(\d+)/);
                if (pitchMatch) pitch = Number.parseInt(pitchMatch[1], 10);
                if (fovMatch) fov = Number.parseInt(fovMatch[1], 10);
            } else if (text.includes(',')) {
                const parts = text.split(',');
                pitch = Number.parseInt(parts[3], 10) || 0;
                fov = Number.parseInt(parts[5], 10) || 80;
            }
            
            template.directions = template.directions.map(() => ({ pitch, fov }));
            saveTemplateSettings();
            renderTemplateRows();
            updateSamplerTemplateSummary();
            document.getElementById('import-params').value = '';
            if (previewPoint) updatePreview();
        }

        initMap();
        renderTemplateRows();
        loadTemplateSettings();
        refreshTemplatePresetSelect();
        updateAreaModeUI();
        updateSamplerSegmentCount();
        window.addEventListener('resize', applyPreviewCrop);
        
        // Delay counter init slightly to ensure DOM is ready
        setTimeout(initApiCounter, 0);
    </script>
    
    <div class="api-counter" id="api-counter">
        <span>Session: <b id="counter-session">0</b></span>
        <span>Today: <b id="counter-today">0</b></span>
        <span>Cumulative: <b id="counter-cumulative">0</b></span>
    </div>
</body>
</html>
